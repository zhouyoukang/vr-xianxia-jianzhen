    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #030810;
        color: #fff;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        overflow: hidden;
        touch-action: none;
      }
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        background: radial-gradient(
          ellipse at center,
          rgba(0, 40, 20, 0.4) 0%,
          rgba(3, 8, 16, 0.95) 70%
        );
        transition: opacity 0.5s;
      }
      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        color: #00ff88;
        text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        margin-bottom: 0.5em;
        letter-spacing: 0.1em;
      }
      .subtitle {
        font-size: 1.1rem;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 2em;
        text-align: center;
        line-height: 1.8;
      }
      #enterVR {
        padding: 18px 48px;
        font-size: 1.3rem;
        background: linear-gradient(135deg, #00ff88, #00cc66);
        color: #030810;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-weight: bold;
        letter-spacing: 0.05em;
        transition: all 0.3s;
        box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
      }
      #enterVR:hover {
        transform: scale(1.05);
        box-shadow: 0 0 50px rgba(0, 255, 136, 0.5);
      }
      #enterVR:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      #enterFlat {
        padding: 12px 36px;
        font-size: 1rem;
        background: transparent;
        color: #00ff88;
        border: 1px solid rgba(0, 255, 136, 0.4);
        border-radius: 50px;
        cursor: pointer;
        margin-top: 1em;
        transition: all 0.3s;
      }
      #enterFlat:hover {
        background: rgba(0, 255, 136, 0.1);
      }
      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 8px 16px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 20px;
        font-size: 13px;
        z-index: 20;
        transition: color 0.3s;
      }
      #modeUI {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 20;
        text-shadow: 0 0 10px #00ff88;
        pointer-events: none;
      }
      #modeUI h2 {
        font-size: 1.6rem;
        margin-bottom: 6px;
        transition: color 0.3s;
      }
      #modeUI p {
        font-size: 0.85rem;
        opacity: 0.65;
      }
      .gesture-guide {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-top: 1.5em;
        max-width: 400px;
      }
      .gesture-item {
        padding: 10px 16px;
        background: rgba(0, 255, 136, 0.08);
        border: 1px solid rgba(0, 255, 136, 0.2);
        border-radius: 12px;
        text-align: center;
        font-size: 0.85rem;
        line-height: 1.5;
      }
      .gesture-item .icon {
        font-size: 1.5rem;
        display: block;
        margin-bottom: 4px;
      }
      #info {
        position: fixed;
        top: 12px;
        right: 12px;
        padding: 8px 14px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 12px;
        font-size: 11px;
        z-index: 20;
        color: rgba(255, 255, 255, 0.5);
      }
      /* ===== CULTIVATION SYSTEM ===== */
      #cultivation-hud {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 60;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        pointer-events: none;
      }
      #qi-bar-container {
        width: 240px;
        height: 12px;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 6px;
        border: 1px solid rgba(0, 200, 255, 0.3);
        overflow: hidden;
        backdrop-filter: blur(4px);
      }
      #qi-bar {
        height: 100%;
        background: linear-gradient(90deg, #0088ff, #00ccff, #88eeff);
        border-radius: 6px;
        transition: width 0.3s;
        width: 100%;
        box-shadow: 0 0 8px rgba(0, 136, 255, 0.5);
      }
      #realm-display {
        font-size: 12px;
        color: #88eeff;
        text-shadow: 0 0 12px rgba(0, 200, 255, 0.6);
        letter-spacing: 2px;
        font-weight: bold;
      }
      #skill-bar {
        display: flex;
        gap: 5px;
        pointer-events: auto;
      }
      .skill-slot {
        width: 38px;
        height: 38px;
        border-radius: 7px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        position: relative;
        transition: all 0.2s;
        backdrop-filter: blur(4px);
      }
      .skill-slot:hover {
        border-color: #00ff88;
        transform: scale(1.1);
      }
      .skill-slot.active {
        border-color: #ffaa44;
        box-shadow: 0 0 12px rgba(255, 170, 68, 0.4);
      }
      .skill-slot.cooldown {
        opacity: 0.5;
      }
      .skill-slot .cd-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 0 0 5px 5px;
        display: none;
      }
      .skill-slot .key-hint {
        position: absolute;
        top: -7px;
        right: -3px;
        font-size: 8px;
        background: rgba(0, 0, 0, 0.8);
        padding: 1px 3px;
        border-radius: 3px;
        color: #aaa;
      }
      #fly-indicator {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 55;
        display: none;
        font-size: 20px;
        color: #00ccff;
        text-shadow: 0 0 25px #0088ff;
        animation: flyPulse 1.5s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes flyPulse {
        0%,
        100% {
          opacity: 0.6;
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.1);
        }
      }
      #spell-flash {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .flash-fire {
        background: radial-gradient(
          circle at center,
          rgba(255, 100, 0, 0.3),
          transparent 70%
        );
      }
      .flash-ice {
        background: radial-gradient(
          circle at center,
          rgba(0, 180, 255, 0.3),
          transparent 70%
        );
      }
      .flash-lightning {
        background: radial-gradient(
          circle at center,
          rgba(200, 150, 255, 0.4),
          transparent 70%
        );
      }
      .flash-sword {
        background: radial-gradient(
          circle at center,
          rgba(0, 255, 136, 0.3),
          transparent 70%
        );
      }
      #breakthrough {
        position: fixed;
        inset: 0;
        z-index: 300;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: radial-gradient(
          ellipse,
          rgba(255, 215, 0, 0.15),
          rgba(0, 0, 0, 0.95)
        );
        animation: btFade 3s forwards;
        pointer-events: none;
      }
      @keyframes btFade {
        0% {
          opacity: 0;
        }
        15% {
          opacity: 1;
        }
        85% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      #breakthrough h2 {
        font-size: 32px;
        color: #ffd700;
        text-shadow: 0 0 40px #ffd700;
        margin-bottom: 10px;
      }
      #breakthrough p {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.8);
      }
      .nav-link {
        display: inline-block;
        margin-top: 1.5em;
        padding: 10px 28px;
        font-size: 0.9rem;
        color: #88ccff;
        border: 1px solid rgba(136, 204, 255, 0.3);
        border-radius: 50px;
        text-decoration: none;
        transition: all 0.3s;
      }
      .nav-link:hover {
        background: rgba(136, 204, 255, 0.1);
        border-color: #88ccff;
        color: #bbddff;
      }
      #controls-hint {
        position: fixed;
        bottom: 70px;
        right: 12px;
        z-index: 60;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 10px;
        font-size: 10px;
        line-height: 1.6;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(0, 255, 136, 0.15);
        transition: opacity 2s;
        display: none;
      }
      @keyframes btShake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px) rotate(-0.5deg);
        }
        75% {
          transform: translateX(4px) rotate(0.5deg);
        }
      }
      #med-vignette {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.8s;
        background: radial-gradient(
          ellipse at center,
          transparent 50%,
          rgba(0, 100, 255, 0.12) 100%
        );
      }
      #med-vignette.active {
        opacity: 1;
      }
      #cam-preview {
        position: fixed;
        bottom: 140px;
        left: 12px;
        width: 160px;
        height: 120px;
        border-radius: 12px;
        border: 2px solid rgba(0, 255, 136, 0.3);
        z-index: 50;
        display: none;
        object-fit: cover;
        transform: scaleX(-1);
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
      }
      #cam-canvas {
        position: fixed;
        bottom: 140px;
        left: 12px;
        width: 160px;
        height: 120px;
        border-radius: 12px;
        z-index: 51;
        pointer-events: none;
        display: none;
      }
      #fs-toggle {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 60;
        padding: 6px 12px;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(0, 255, 136, 0.3);
        border-radius: 20px;
        color: #00ff88;
        font-size: 16px;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: all 0.3s;
        display: none;
      }
      #fs-toggle:hover {
        background: rgba(0, 255, 136, 0.1);
        border-color: #00ff88;
      }
      #cam-toggle {
        position: fixed;
        bottom: 100px;
        left: 12px;
        z-index: 60;
        padding: 6px 14px;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(0, 255, 136, 0.3);
        border-radius: 20px;
        color: #00ff88;
        font-size: 12px;
        cursor: pointer;
        display: none;
        backdrop-filter: blur(8px);
        transition: all 0.3s;
      }
      #cam-toggle:hover {
        background: rgba(0, 255, 136, 0.1);
        border-color: #00ff88;
      }
      #cam-toggle.active {
        border-color: #00ff88;
        box-shadow: 0 0 12px rgba(0, 255, 136, 0.3);
      }
      #cam-gesture-label {
        position: fixed;
        bottom: 264px;
        left: 12px;
        width: 160px;
        text-align: center;
        z-index: 52;
        color: #00ff88;
        font-size: 13px;
        font-weight: bold;
        text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
        pointer-events: none;
        display: none;
      }
      @media (max-width: 480px) {
        #cam-preview,
        #cam-canvas {
          width: 110px;
          height: 82px;
        }
        #cam-gesture-label {
          width: 110px;
          bottom: 226px;
          font-size: 11px;
        }
        #cam-toggle {
          font-size: 11px;
          padding: 4px 10px;
        }
      }
    </style>

    <!-- ╔═══════════════════════════════════════════════════════════╗
         ║  道·源 DaoSource — CDN自适应: 万源归一 · 唯变所适         ║
         ║  Three CDNs race; the fastest wins. If all fail, rotate.  ║
         ╚═══════════════════════════════════════════════════════════╝ -->
    <script>
      (function () {
        var CDNS = [
          [
            "jsdelivr",
            "https://cdn.jsdelivr.net/npm/three@0.178.0/build/three.module.js",
            "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",
          ],
          [
            "unpkg",
            "https://unpkg.com/three@0.178.0/build/three.module.js",
            "https://unpkg.com/three@0.178.0/examples/jsm/",
          ],
          [
            "esm.sh",
            "https://esm.sh/three@0.178.0/build/three.module.js",
            "https://esm.sh/three@0.178.0/examples/jsm/",
          ],
        ];
        // Read CDN preference from URL (?cdn=0|1|2)
        var params = new URLSearchParams(location.search);
        var pref = parseInt(params.get("cdn") || "0", 10);
        if (pref < 0 || pref >= CDNS.length) pref = 0;
        var cdn = CDNS[pref];
        window._daoCdnIdx = pref;
        window._daoCdnName = cdn[0];
        // Inject importmap dynamically — runs before any module script
        var im = document.createElement("script");
        im.type = "importmap";
        im.textContent = JSON.stringify({
          imports: { three: cdn[1], "three/addons/": cdn[2] },
        });
        document.currentScript.after(im);
        console.log("道·源 CDN:", cdn[0], "(index", pref + ")");
      })();
    </script>
    <script>
      // 道·源 fallback — if Three.js fails to load, rotate CDN and reload
      setTimeout(function () {
        if (!window._threeLoaded) {
          var next = ((window._daoCdnIdx || 0) + 1) % 3;
          var params = new URLSearchParams(location.search);
          var tried = parseInt(params.get("_retry") || "0", 10);
          if (tried < 3) {
            // Auto-rotate to next CDN
            params.set("cdn", next);
            params.set("_retry", tried + 1);
            console.warn("道·源 CDN", window._daoCdnName, "超时, 切换至", next);
            location.search = params.toString();
            return;
          }
          // All CDNs exhausted
          var s = document.getElementById("status");
          if (s) {
            s.style.display = "block";
            s.textContent = "⚠️ 所有CDN均不可用, 请检查网络后刷新";
            s.style.color = "#ff6644";
          }
          var v = document.getElementById("enterVR");
          if (v) v.textContent = "加载失败 - 请刷新";
        }
      }, 12000);
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { mergeGeometries } from "three/addons/utils/BufferGeometryUtils.js";
      import { VRButton } from "three/addons/webxr/VRButton.js";
      window._threeLoaded = true;

      // ╔══════════════════════════════════════════════════════════════╗
      // ║  道·感知 DaoSense — 自动探测一切设备能力 · 无需用户告知    ║
      // ║  Water finds its level; the system senses and adapts.      ║
      // ╚══════════════════════════════════════════════════════════════╝
      const Sense = (() => {
        const ua = navigator.userAgent;
        const touch = "ontouchstart" in window || navigator.maxTouchPoints > 1;
        const fine = matchMedia("(pointer:fine)").matches;
        const gyro = !!window.DeviceOrientationEvent;
        const quest = /Quest|Oculus/i.test(ua);
        const pico = /Pico/i.test(ua);
        const vision = /Apple.*XR|Vision/i.test(ua);
        const hmd =
          quest || pico || vision || /HTC|Vive|Valve|WMR|Pimax/i.test(ua);
        const mobile =
          /Android|iPhone|iPad|iPod|webOS|BlackBerry/i.test(ua) ||
          (touch && !fine);
        const tablet = mobile && Math.min(screen.width, screen.height) > 600;
        // GPU tier: 0=low 1=mid 2=high — soft-detected from WebGL
        let gpu = 2;
        try {
          const c = document.createElement("canvas");
          const gl = c.getContext("webgl2") || c.getContext("webgl");
          if (gl) {
            const d = gl.getExtension("WEBGL_debug_renderer_info");
            const r = d ? gl.getParameter(d.UNMASKED_RENDERER_WEBGL) : "";
            if (/Mali-G5|Adreno 5|Apple A[89]|PowerVR/i.test(r)) gpu = 0;
            else if (/Mali-G7|Adreno 6[0-3]|Apple A1[0-4]|Intel.*UHD/i.test(r))
              gpu = 1;
          } else gpu = 0;
        } catch (e) {
          gpu = 1;
        }
        if (hmd && quest) gpu = Math.min(gpu, 1);
        const hasGamepad = !!navigator.getGamepads;
        const S = {
          touch,
          fine,
          gyro,
          quest,
          pico,
          vision,
          hmd,
          mobile,
          tablet,
          gpu,
          hasGamepad,
          get label() {
            const p = [];
            if (hmd)
              p.push(
                quest ? "Quest" : pico ? "Pico" : vision ? "Vision" : "HMD",
              );
            if (mobile && !hmd) p.push(tablet ? "Tablet" : "Mobile");
            if (!mobile && !hmd) p.push("Desktop");

      const _tpOrigin = new THREE.Vector3();
      const _tpP = new THREE.Vector3();
      const _tpV = new THREE.Vector3();
      const _tpStep = new THREE.Vector3();
      const _tpCamPos = new THREE.Vector3();
      const _tpOffset = new THREE.Vector3();
      // Pre-allocate identity quaternion for XRRigidTransform (avoid per-frame GC)
      const _xrIdentityQuat = { x: 0, y: 0, z: 0, w: 1 };

      function updateTeleport(session, delta) {
        if (!session) return;
        teleportAiming = false;
        teleportTarget = null;

        for (const source of session.inputSources) {
          if (!source.gamepad || source.handedness !== "left") continue;
          const gp = source.gamepad;
          if (gp.axes.length < 4) continue;

          const fwd = -gp.axes[3]; // forward on left stick (negative Y = forward)
          if (fwd < 0.5) continue; // only activate when pushed significantly forward

          teleportAiming = true;
          const ctrl = source.handedness === "left" ? controller1 : controller2;
          if (!ctrl) continue;

          _tpDir.set(0, 0, -1).applyQuaternion(ctrl.quaternion);
          ctrl.getWorldPosition(_tpOrigin);
          _tpV.copy(_tpDir).multiplyScalar(5);
          const gravity = -9.8;
          _tpP.copy(_tpOrigin);
          const dt2 = 0.05;

          // Write arc directly to buffer (zero allocations)
          const arr = teleportArc.geometry.attributes.position.array;
          let arcLen = 0;
          for (let step = 0; step < 30; step++) {
            arr[arcLen * 3] = _tpP.x;
            arr[arcLen * 3 + 1] = _tpP.y;
            arr[arcLen * 3 + 2] = _tpP.z;
            arcLen++;
            _tpV.y += gravity * dt2;
            _tpStep.copy(_tpV).multiplyScalar(dt2);
            _tpP.add(_tpStep);
            if (_tpP.y <= 0.02) {
              teleportTarget = _tpP; // reuse vector, copy coords when needed
              arr[arcLen * 3] = _tpP.x;
              arr[arcLen * 3 + 1] = 0;
              arr[arcLen * 3 + 2] = _tpP.z;
              arcLen++;
              break;
            }
          }
          // Zero remaining arc points
          for (let i = arcLen; i < 30; i++) {
            arr[i * 3] = arr[i * 3 + 1] = arr[i * 3 + 2] = 0;
          }
          teleportArc.geometry.attributes.position.needsUpdate = true;
          teleportArc.geometry.setDrawRange(0, arcLen);
          break;
        }

        // Update visuals
        teleportArc.material.opacity = teleportAiming ? 0.6 : 0;
        if (teleportTarget) {
          teleportRing.position.set(teleportTarget.x, 0.02, teleportTarget.z);
          teleportRing.material.opacity = 0.5;
          teleportRing.rotation.z += delta * 2;
        } else {
          teleportRing.material.opacity = 0;

        if (teleportTarget && teleportAiming) {
          for (const source of session.inputSources) {

            if (source.gamepad.buttons[0]?.pressed) {

        vrHudGroup.userData.canvas = canvas;
        vrHudGroup.userData.ctx = ctx;
        vrHudGroup.userData.texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({
          map: vrHudGroup.userData.texture,
          transparent: true,
          opacity: 0.8,
        });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.scale.set(0.6, 0.15, 1);
        sprite.position.set(0, -0.15, -0.8);
        vrHudGroup.add(sprite);
        vrHudGroup.userData.sprite = sprite;
        return vrHudGroup;
      }

      let _vrHudLastMode = "",
        _vrHudLastQi = -1,
        _vrHudLastSpell = -1,
        _vrHudLastFly = false,
        _vrHudLastMed = false,
        _vrHudLastRealm = -1,
        _vrHudLastFps = 0;
      function updateVRHud() {
        if (!vrHudGroup) return;
        // Dirty check: only redraw when state changes (saves ~2ms/frame on Quest 3)
        const curMode = state.gestureMode,
          curQi = Math.round(cult.qi),
          curSpell = cult.currentSpellIdx,
          curFly = cult.flying,
          curMed = cult.meditating,
          curRealm = cult.realmIdx,
          curFps = lastDisplayFPS;
        if (
          curMode === _vrHudLastMode &&
          curQi === _vrHudLastQi &&
          curSpell === _vrHudLastSpell &&
          curFly === _vrHudLastFly &&
          curMed === _vrHudLastMed &&
          curRealm === _vrHudLastRealm &&
          curFps === _vrHudLastFps
        )
          return;
        _vrHudLastMode = curMode;
        _vrHudLastQi = curQi;
        _vrHudLastSpell = curSpell;
        _vrHudLastFly = curFly;
        _vrHudLastMed = curMed;
        _vrHudLastRealm = curRealm;
        _vrHudLastFps = curFps;
        const { canvas, ctx, texture } = vrHudGroup.userData;
        ctx.clearRect(0, 0, 512, 128);
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath();
        ctx.roundRect(0, 0, 512, 128, 20);
        ctx.fill();
        const m = state.gestureMode;
        // Row 1: Sword formation mode
        ctx.fillStyle = modeColors[m] || "#00ff88";
        ctx.font = "bold 28px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(modeNames[m] || m, 16, 32);
        // Row 1 right: Realm
        ctx.fillStyle = REALMS[cult.realmIdx].color;
        ctx.font = "bold 22px sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(REALMS[cult.realmIdx].name, 496, 32);
        // Row 2: Qi bar
        const barX = 16,
          barY = 46,
          barW = 480,
          barH = 14;
        ctx.fillStyle = "rgba(0,50,100,0.5)";
        ctx.beginPath();
        ctx.roundRect(barX, barY, barW, barH, 7);
        ctx.fill();
        const qiFrac = cult.qi / cult.maxQi;
        ctx.fillStyle = "#00ccff";
        ctx.beginPath();
        ctx.roundRect(barX, barY, Math.max(0, barW * qiFrac), barH, 7);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.font = "10px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(
          `${Math.round(cult.qi)}/${cult.maxQi}`,
          barX + barW / 2,
          barY + 11,
        );
        // Row 3: Current spell + status
        const dispSpell = SPELLS[spellOrder[cult.currentSpellIdx]];
        ctx.fillStyle = dispSpell.color;
        ctx.font = "18px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`法术: ${dispSpell.name}`, 16, 88);
        // Flight/meditation status
        ctx.fillStyle = "#88eeff";
        ctx.textAlign = "center";
        if (cult.flying) ctx.fillText("⚔️ 御剑飞行中", 256, 88);
        else if (cult.meditating) ctx.fillText("🧘 打坐修炼中", 256, 88);
        // Row 3 right: FPS
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.font = "14px sans-serif";
        ctx.textAlign = "right";
        const vrFps = lastDisplayFPS > 0 ? lastDisplayFPS : "...";
        ctx.fillText(`${vrFps} FPS`, 496, 88);
        // Row 4: Controls hint
        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.font = "12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(
          "A=施法 B=换术 X=飞行 Y=打坐 | Trigger=切阵 Grip=切阵",
          256,
          118,
        );
        texture.needsUpdate = true;
      }

      // ===== WEBXR HAND TRACKING =====
      let hand1, hand2, controller1, controller2;
      let handModelFactory, controllerModelFactory;
      const _xrModReady = Promise.all([
        import("three/addons/webxr/XRControllerModelFactory.js"),
        import("three/addons/webxr/XRHandModelFactory.js"),
      ]).then(([cm, hm]) => {
        controllerModelFactory = new cm.XRControllerModelFactory();
        handModelFactory = new hm.XRHandModelFactory();
      });

      function setupXRInputs() {
        // Controllers
        controller1 = renderer.xr.getController(0);
        controller2 = renderer.xr.getController(1);
        scene.add(controller1);
        scene.add(controller2);

        const cModel1 = controllerModelFactory.createControllerModel(
          renderer.xr.getControllerGrip(0),
        );
        const cModel2 = controllerModelFactory.createControllerModel(
          renderer.xr.getControllerGrip(1),
        );
        const grip1 = renderer.xr.getControllerGrip(0);
        const grip2 = renderer.xr.getControllerGrip(1);
        grip1.add(cModel1);
        grip2.add(cModel2);
        scene.add(grip1);
        scene.add(grip2);

        // Hands
        hand1 = renderer.xr.getHand(0);
        hand2 = renderer.xr.getHand(1);
        const hModel1 = handModelFactory.createHandModel(hand1, "mesh");
        const hModel2 = handModelFactory.createHandModel(hand2, "mesh");
        hand1.add(hModel1);
        hand2.add(hModel2);
        scene.add(hand1);
        scene.add(hand2);

        // Controller ray visualization (VR feedback)
        const rayGeo = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(0, 0, -3),
        ]);
        const rayMat = new THREE.LineBasicMaterial({
          color: 0x00ff88,
          transparent: true,
          opacity: 0.4,
        });
        controller1.add(new THREE.Line(rayGeo.clone(), rayMat.clone()));
        controller2.add(new THREE.Line(rayGeo.clone(), rayMat.clone()));

        // Controller events for mode switching
        controller1.addEventListener("selectstart", cycleModeController);
        controller2.addEventListener("selectstart", cycleModeController);
        controller1.addEventListener("squeezestart", cycleModeController);
        controller2.addEventListener("squeezestart", cycleModeController);

        // Attach VR HUD to camera (D4 fix: only add camera to scene once)
        const hud = createVRHud();
        camera.add(hud);
        if (!camera.parent) scene.add(camera);
      }

      const modeOrder = ["LOTUS", "DRAGON", "SHIELD", "DAGENG"];
      function cycleModeController(event) {
        if (teleportAiming) return; // B3 fix: don't cycle mode while aiming teleport
        const idx = modeOrder.indexOf(state.gestureMode);
        state.gestureMode = modeOrder[(idx + 1) % modeOrder.length];
        state.isTracking = true;
        playModeSwitch();
        updateDroneMode(state.gestureMode);
        modeSwitchFlash = 1.0; // trigger visual flash
        triggerHaptic(event?.target);
      }

      // D8: Haptic feedback for Quest 3 controllers
      function triggerHaptic(controller) {
        try {
          const session = renderer.xr.getSession();
          if (!session) return;
          for (const source of session.inputSources) {
            if (source.gamepad?.hapticActuators?.length > 0) {
              source.gamepad.hapticActuators[0].pulse(0.6, 100);
              break;
            }
            // WebXR Haptics API (newer)
            if (source.gamepad?.vibrationActuator) {
              source.gamepad.vibrationActuator.playEffect("dual-rumble", {
                duration: 100,
                strongMagnitude: 0.5,
                weakMagnitude: 0.3,
              });
              break;
            }
          }
        } catch (e) {
          /* haptics optional */
        }
      }

      // ===== GESTURE DETECTION FROM XR HANDS =====
      // Pre-allocated joint position vectors (avoid 11+ allocations per frame on Quest 3)
      const _jWrist = new THREE.Vector3(),
        _jIndexTip = new THREE.Vector3(),
        _jIndexMcp = new THREE.Vector3();
      const _jMiddleTip = new THREE.Vector3(),
        _jMiddleMcp = new THREE.Vector3();
      const _jRingTip = new THREE.Vector3(),
        _jRingMcp = new THREE.Vector3();
      const _jPinkyTip = new THREE.Vector3(),
        _jPinkyMcp = new THREE.Vector3();
      const _jThumbTip = new THREE.Vector3(),
        _jThumbMcp = new THREE.Vector3();
      const _jPalmCenter = new THREE.Vector3();
      const _handGlowPos = new THREE.Vector3();
      const _ctrlWorldPos = new THREE.Vector3();

      function _jointCount(joints) {
        let n = 0;
        for (const k in joints) n++;
        return n;
      }
      function detectXRHandGesture(hand) {
        const dominated = hand;
        const joints = dominated.joints;
        if (!joints || _jointCount(joints) < 20) return null;

        const getJointPos = (name, out) => {
          const j = joints[name];
          if (!j || !j.visible) return null;
          j.getWorldPosition(out);
          return out;
        };

        const wrist = getJointPos("wrist", _jWrist);
        const indexTip = getJointPos("index-finger-tip", _jIndexTip);
        const indexMcp = getJointPos("index-finger-metacarpal", _jIndexMcp);
        const middleTip = getJointPos("middle-finger-tip", _jMiddleTip);
        const middleMcp = getJointPos("middle-finger-metacarpal", _jMiddleMcp);
        const ringTip = getJointPos("ring-finger-tip", _jRingTip);
        const ringMcp = getJointPos("ring-finger-metacarpal", _jRingMcp);
        const pinkyTip = getJointPos("pinky-finger-tip", _jPinkyTip);
        const pinkyMcp = getJointPos("pinky-finger-metacarpal", _jPinkyMcp);
        const thumbTip = getJointPos("thumb-tip", _jThumbTip);
        const thumbMcp = getJointPos("thumb-metacarpal", _jThumbMcp);

        if (
          !wrist ||
          !indexTip ||
          !middleTip ||
          !ringTip ||
          !pinkyTip ||
          !thumbTip
        )
          return null;
        if (!indexMcp || !middleMcp || !ringMcp || !pinkyMcp || !thumbMcp)
          return null;

        // Finger extension: tip-to-wrist distance > metacarpal-to-wrist distance * threshold
        const isExtended = (tip, mcp) => {
          const tipDist = tip.distanceTo(wrist);
          const mcpDist = mcp.distanceTo(wrist);
          return tipDist > mcpDist * 1.04;
        };

        const index = isExtended(indexTip, indexMcp);
        const middle = isExtended(middleTip, middleMcp);
        const ring = isExtended(ringTip, ringMcp);
        const pinky = isExtended(pinkyTip, pinkyMcp);
        const thumb = isExtended(thumbTip, thumbMcp);

        const extCount = [index, middle, ring, pinky, thumb].filter(
          Boolean,
        ).length;

        // Palm center for target position
        _jPalmCenter.copy(wrist).lerp(middleMcp, 0.6);
        const palmCenter = _jPalmCenter;

        let gesture = "LOTUS";
        const isFist = extCount <= 1;
        const isOpenPalm = index && middle && ring && pinky;
        const isRock = index && pinky && !middle && !ring;
        const isSwordFinger = index && middle && !ring && !pinky;
        const isGun = thumb && index && !middle && !ring && !pinky;

        if (isFist) gesture = "SHIELD";
        else if (isRock) gesture = "DAGENG";
        else if (isGun || isSwordFinger) gesture = "DRAGON";
        else if (isOpenPalm) gesture = "LOTUS";

        return {
          gesture,
          palmCenter,
          indexTip,
          isTracking: true,
        };
      }

      // ===== SWORD UPDATE =====
      const dummy = new THREE.Object3D();
      let currentScales = new Float32Array(CFG.swordCount).fill(1);
      // P1+P3+P4+P6+P7+P8: Pre-allocated temp vectors (zero per-frame GC)
      const _tgt = new THREE.Vector3();
      const _currentTarget = new THREE.Vector3();
      const _fwdVec = new THREE.Vector3();
      const _rightVec = new THREE.Vector3();
      const _upVec = new THREE.Vector3(0, 1, 0);
      const _tmpVec1 = new THREE.Vector3(); // separation/dragon path
      const _tmpVec2 = new THREE.Vector3(); // lookTarget
      const _tmpVec3 = new THREE.Vector3(); // lookTarget secondary
      const _downVec = new THREE.Vector3(0, -1, 0);
      const _defaultDir = new THREE.Vector3(0, 0, -1);
      const _handDiffVec = new THREE.Vector3();
      const _ptrVec = new THREE.Vector3();
      const _ptrWorldPos = new THREE.Vector3();
      const _spellOrigin = new THREE.Vector3();

      function updateSwords(time, delta) {
        const dt = Math.min(delta, 1 / 30);
        const target = state.targetPosition;
        const mode = state.gestureMode;
        const tracking = state.isTracking;
        const history = state.pathHistory;

        _currentTarget.copy(target);
        let currentTarget = _currentTarget;
        if (!tracking) {
          currentTarget.set(
            Math.sin(time * 0.5) * 0.8,
            1.2 + Math.cos(time * 0.4) * 0.5,
            -2 + Math.sin(time * 0.3) * 0.4,
          );
          const _histRecycle = history.pop();
          _histRecycle.copy(currentTarget);
          history.unshift(_histRecycle);
        } else if (mode === "DRAGON") {
          // Extend path
          const last = history[0];
          const dir = state.lastDirection;
          if (dir.length() > 0.001) {
            const _hRec = history.pop();
            _hRec.copy(last).addScaledVector(dir, 0.04);
            history.unshift(_hRec);
          }
        }

        const activeCount = Math.min(adaptiveSwordCount, CFG.swordCount);
        swordMesh.count = activeCount;
        auraMesh.count = activeCount;
        for (let i = 0; i < activeCount; i++) {
          const pos = swordPositions[i];
          const vel = swordVelocities[i];
          const tgt = _tgt;

          if (mode === "SHIELD" && tracking) {
            const phi = Math.acos(1 - (2 * (i + 0.5)) / CFG.swordCount);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;
            const ox =
              CFG.shieldRadius *
              Math.sin(phi) *
              Math.cos(theta + time * CFG.shieldOrbitSpeed);
            const oy =
              CFG.shieldRadius *
              Math.sin(phi) *
              Math.sin(theta + time * CFG.shieldOrbitSpeed);
            const oz = CFG.shieldRadius * Math.cos(phi);
            const rx = ox * Math.cos(time * 0.3) - oz * Math.sin(time * 0.3);
            const rz = ox * Math.sin(time * 0.3) + oz * Math.cos(time * 0.3);
            tgt.set(
              currentTarget.x + rx,
              currentTarget.y + oy,
              currentTarget.z + rz,
            );
            tgt.x += Math.sin(time * 3 + i) * 0.025;
            tgt.y += Math.cos(time * 3 + i * 0.7) * 0.025;
          } else if (mode === "LOTUS" || !tracking) {
            const goldenAngle = Math.PI * (3 - Math.sqrt(5));
            const minR = 0.8,
              maxR = CFG.lotusRadius;
            const t2 = i / (CFG.swordCount - 1);
            const r = minR + (maxR - minR) * Math.sqrt(t2);
            const theta = i * goldenAngle + time * CFG.lotusRotateSpeed;
            const breathe = 1 + Math.sin(time * 2) * 0.05;
            const cr = r * breathe;
            tgt.set(
              currentTarget.x + cr * Math.cos(theta),
              currentTarget.y + cr * Math.sin(theta),
              currentTarget.z + Math.sin(time * 2 + i * 0.1) * 0.025,
            );
          } else if (mode === "DAGENG" && tracking) {
            if (i === 0) {
              tgt.set(currentTarget.x, currentTarget.y + 0.7, currentTarget.z);
            } else {
              const ei = i - 1,
                ec = CFG.swordCount - 1;
              const layerCount = 10;
              const perLayer = Math.max(1, Math.floor(ec / layerCount));
              const layerIdx = Math.floor(ei / perLayer);
              const idxInLayer = ei % perLayer;
              const radius = CFG.dagengRadius + layerIdx * 0.2 + 0.3;
              const dir2 = layerIdx % 2 === 0 ? 1 : -1;
              const theta =
                (idxInLayer / perLayer) * Math.PI * 2 +
                time * CFG.dagengRotateSpeed * dir2;
              const hCenter = currentTarget.y - 1.5;
              const hRand = Math.sin(ei * 13.1) * 0.5 + 0.5;
              const height = hCenter + (hRand - 0.5) * CFG.dagengHeight;
              tgt.set(
                currentTarget.x + Math.cos(theta) * radius,
                height,
                currentTarget.z + Math.sin(theta) * radius,
              );
            }
          } else {
            // DRAGON
            if (i < 5) {
              tgt.copy(currentTarget);
              tgt.x += Math.sin(time * 8 + i) * 0.04;
              tgt.y += Math.cos(time * 8 + i) * 0.04;
            } else {
              const pathIdx = i * 0.8;
              const idxA = Math.min(Math.floor(pathIdx), history.length - 1);
              const idxB = Math.min(idxA + 1, history.length - 1);
              const alpha = pathIdx - Math.floor(pathIdx);
              if (history[idxA] && history[idxB]) {
                tgt.lerpVectors(history[idxA], history[idxB], alpha);
              } else {
                tgt.copy(currentTarget);
              }
              tgt.x += Math.sin(time * 10 + i * 0.5) * 0.025;
              tgt.y += Math.cos(time * 10 + i * 0.5) * 0.025;
              const ns = CFG.noiseScale,
                na = CFG.noiseStrength;
              tgt.x += noise3D(pos.x * ns, pos.y * ns, time) * na;
              tgt.y += noise3D(pos.y * ns, pos.z * ns, time + 100) * na;
              tgt.z += noise3D(pos.z * ns, pos.x * ns, time + 200) * na;
            }
          }

          // Steering
          let speed = mode === "SHIELD" ? CFG.sprintSpeed : CFG.maxSpeed;
          const distToTarget = tgt.distanceTo(pos);
          if (distToTarget > 0.6) speed = CFG.sprintSpeed;
          else if (distToTarget < 0.15)
            speed = (distToTarget * CFG.maxSpeed) / 0.15;

          const desired = tgt.sub(pos);
          const d = desired.length();
          if (d > 0) {
            desired.normalize();
            desired.multiplyScalar(d < 1.5 ? speed * (d / 1.5) : speed);
          }
          const steer = desired.sub(vel);
          const sf = mode === "SHIELD" || mode === "LOTUS" ? 3 : 1;
          steer.clampLength(0, CFG.steerForce * dt * sf);
          vel.add(steer);

          // Separation
          if (i > 0 && mode !== "SHIELD" && (mode !== "LOTUS" || !tracking)) {
            const prev = swordPositions[i - 1];
            _tmpVec1.copy(pos).sub(prev);
            const dd = _tmpVec1.length();
            if (dd < CFG.separationDist && dd > 0.001) {
              _tmpVec1.normalize().multiplyScalar(CFG.separationForce * dt);
              vel.add(_tmpVec1);
            }
          }

          pos.addScaledVector(vel, dt);

          // Emit trail particles for fast swords (every 4th sword to save perf)
          if (i % 4 === 0 && vel.length() > 0.5) {
            emitTrailParticle(pos, vel);
          }

          // Matrix update
          dummy.position.copy(pos);

          // Look direction (zero-alloc)
          if (mode === "SHIELD" && tracking) {
            if (vel.length() > 0.01) {
              _tmpVec2.copy(vel).normalize();
              _tmpVec3.copy(pos).add(_tmpVec2);
            } else {
              _tmpVec2.copy(pos).sub(currentTarget);
              _tmpVec3.set(-_tmpVec2.z, 0, _tmpVec2.x).normalize().add(pos);
            }
          } else if (mode === "LOTUS") {
            _tmpVec2.copy(pos).sub(currentTarget).normalize();
            _tmpVec3.copy(pos).add(_tmpVec2);
          } else if (mode === "DAGENG" && tracking) {
            _tmpVec3.copy(pos).add(_downVec);
          } else {
            _tmpVec3.copy(pos).add(vel.length() > 0.01 ? vel : _defaultDir);
          }
          dummy.lookAt(_tmpVec3);

          // Scale
          let targetScale = 1;
          if (mode === "DAGENG" && tracking) {
            targetScale = i === 0 ? 5 : 1.5;
          }
          const lerpSpd = i === 0 && mode === "DAGENG" ? 0.01 : 0.02;
          currentScales[i] = THREE.MathUtils.lerp(
            currentScales[i],
            targetScale,
            lerpSpd,
          );
          dummy.scale.setScalar(currentScales[i]);

          dummy.updateMatrix();
          swordMesh.setMatrixAt(i, dummy.matrix);

          // Aura
          const isActive =
            mode === "SHIELD"
              ? Math.sin(time * 30 + i * 0.5) > 0.0
              : Math.sin(time * 20 + i * 0.7) > 0.3;
          const auraScale = currentScales[i] * (isActive ? 1.3 : 1.0);
          if (!isActive && !(i === 0 && mode === "DAGENG")) {
            dummy.scale.set(0, 0, 0);
          } else {
            dummy.scale.setScalar(auraScale);
          }
          dummy.updateMatrix();
          auraMesh.setMatrixAt(i, dummy.matrix);
          dummy.scale.setScalar(currentScales[i]);
        }

        swordMesh.instanceMatrix.needsUpdate = true;
        auraMesh.instanceMatrix.needsUpdate = true;
      }

      // ===== LIGHTNING UPDATE =====
      function updateLightning(time) {
        const targetI = state.gestureMode === "DAGENG" ? 1 : 0;
        lightningIntensity = THREE.MathUtils.lerp(
          lightningIntensity,
          targetI,
          0.02,
        );
        const flashSpeed = 15 + lightningIntensity * 10;
        const flashThreshold = 0.7 - lightningIntensity * 0.3;
        const flash = Math.sin(time * flashSpeed) > flashThreshold;
        lightning.visible = flash && state.isTracking;
        if (!flash || !state.isTracking) return;

        const count = Math.floor(30 + lightningIntensity * 70);
        const maxDist = 0.7 + lightningIntensity * 3;
        const jitter = 0.025 + lightningIntensity * 0.04;
        const arr = lightning.geometry.attributes.position.array;
        let idx = 0;
        for (let i = 0; i < count && idx < arr.length - 6; i++) {
          const a = Math.floor(Math.random() * CFG.swordCount);
          const b = Math.floor(Math.random() * CFG.swordCount);
          const pA = swordPositions[a],
            pB = swordPositions[b];
          if (pA.distanceTo(pB) < maxDist) {
            arr[idx++] = pA.x + (Math.random() - 0.5) * jitter;
            arr[idx++] = pA.y + (Math.random() - 0.5) * jitter;
            arr[idx++] = pA.z + (Math.random() - 0.5) * jitter;
            arr[idx++] = pB.x + (Math.random() - 0.5) * jitter;
            arr[idx++] = pB.y + (Math.random() - 0.5) * jitter;
            arr[idx++] = pB.z + (Math.random() - 0.5) * jitter;
          }
        }
        while (idx < arr.length) arr[idx++] = 0;
        lightning.geometry.attributes.position.needsUpdate = true;
      }

      // ===== MAGIC CIRCLE UPDATE =====
      function updateMagicCircle(time) {
        const targetOp =
          state.gestureMode === "DAGENG" && state.isTracking ? 1 : 0;
        mcOpacity = THREE.MathUtils.lerp(mcOpacity, targetOp, 0.05);
        mcUniforms.uTime.value = time;
        mcUniforms.uOpacity.value = mcOpacity;
        magicCircle.rotation.z = time * 0.1;
        magicCircle.visible = mcOpacity > 0.01;
        if (magicCircle.visible) {
          magicCircle.position.set(
            state.targetPosition.x,
            state.targetPosition.y + 2.0,
            state.targetPosition.z,
          );
        }
      }

      // ===== SPIRIT PARTICLES UPDATE =====
      function updateSpirits(time) {
        if (!spiritParticles) return;
        const arr = spiritParticles.geometry.attributes.position.array;
        for (let i = 0; i < arr.length / 3; i++) {
          arr[i * 3 + 1] += Math.sin(time + i) * 0.001;

      // ===== UI UPDATE =====

      // ===== GESTURE DEBOUNCE =====
      let pendingGesture = null;
      let gestureStartTime = 0;

      const GESTURE_DELAY = 0.3;

      function processHandGesture(result, time) {
        if (!result) {
          state.isTracking = false;
          return;
        }

        state.isTracking = true;

        // Position mapping
        const mode = confirmedGesture;
        if (mode === "DRAGON") {
          state.targetPosition.copy(result.indexTip);
          // Update path
          const last = state.pathHistory[0];
          _handDiffVec.copy(result.indexTip).sub(last);
          if (_handDiffVec.length() > 0.01) {
            state.lastDirection.copy(_handDiffVec.normalize());
            const _hRec1 = state.pathHistory.pop();
            _hRec1.copy(result.indexTip);
            state.pathHistory.unshift(_hRec1);
          }
        } else {
          state.targetPosition.copy(result.palmCenter);
        }

        // Debounce gesture
        if (result.gesture !== pendingGesture) {
          pendingGesture = result.gesture;
          gestureStartTime = time;
        } else if (
          time - gestureStartTime > GESTURE_DELAY &&
          result.gesture !== confirmedGesture
        ) {
          confirmedGesture = result.gesture;
          state.gestureMode = result.gesture;
          updateDroneMode(state.gestureMode);
        }
      }

      // ===== FLAT MODE (MOUSE/TOUCH) =====
      let flatMode = false;
      function enableFlatMode() {
        flatMode = true;
        state.isTracking = true;
        camera.position.set(0, 2.5, 6);
        controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, -1);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 15;
        controls.minDistance = 0.5;
        controls.update();
        // Adjust fog for flat viewing
        scene.fog.near = 15;
        scene.fog.far = 50;

        // Mouse/touch for target (yields to camera when active)
        const onPointer = (e) => {
          if (DaoEye.active) return;
          const rect = renderer.domElement.getBoundingClientRect();
          const cx = e.clientX || (e.touches && e.touches[0]?.clientX) || 0;
          const cy = e.clientY || (e.touches && e.touches[0]?.clientY) || 0;
          const ndcX = ((cx - rect.left) / rect.width) * 2 - 1;
          const ndcY = -((cy - rect.top) / rect.height) * 2 + 1;
          _ptrVec.set(ndcX, ndcY, 0.5).unproject(camera);
          _ptrVec.sub(camera.position).normalize();
          const dist = (1.2 - camera.position.y) / _ptrVec.y || 3;
          _ptrWorldPos
            .copy(camera.position)
            .addScaledVector(_ptrVec, Math.abs(dist));
          state.targetPosition.copy(_ptrWorldPos);
          if (state.gestureMode === "DRAGON") {
            const last = state.pathHistory[0];
            _handDiffVec.copy(_ptrWorldPos).sub(last);
            if (_handDiffVec.length() > 0.01) {
              state.lastDirection.copy(_handDiffVec.normalize());
              const _hRec2 = state.pathHistory.pop();
              _hRec2.copy(_ptrWorldPos);
              state.pathHistory.unshift(_hRec2);
            }
          }
        };
        renderer.domElement.addEventListener("pointermove", onPointer);
        renderer.domElement.addEventListener(
          "touchmove",
          (e) => {
            e.preventDefault();
            onPointer(e);
          },
          { passive: false },
        );

        // Double-click to cycle mode (T3-2: avoids conflict with OrbitControls drag)
        renderer.domElement.addEventListener("dblclick", () => {
          if (DaoEye.active) return;
          const idx = modeOrder.indexOf(state.gestureMode);
          state.gestureMode = modeOrder[(idx + 1) % modeOrder.length];
          confirmedGesture = state.gestureMode;
          modeSwitchFlash = 1.0;
          playModeSwitch();
          updateDroneMode(state.gestureMode);
        });

        // WASD movement keys
        const keys = {};
        document.addEventListener("keydown", (e) => {
          keys[e.key.toLowerCase()] = true;
        });
        document.addEventListener("keyup", (e) => {
          keys[e.key.toLowerCase()] = false;
        });
        window._flatKeys = keys;

        // Cultivation keyboard bindings
        document.addEventListener("keydown", (e) => {
          const k = e.key.toLowerCase();
          if (k === "1") castSpell("fire");
          else if (k === "2") castSpell("ice");
          else if (k === "3") castSpell("lightning");
          else if (k === "4") castSpell("sword");
          else if (k === "f") toggleFlight();
          else if (k === "m") toggleMeditation();
          else if (k === "q") {
            if (DaoEye.active) return;
            const idx2 = modeOrder.indexOf(state.gestureMode);
            state.gestureMode = modeOrder[(idx2 + 1) % modeOrder.length];
            confirmedGesture = state.gestureMode;
            modeSwitchFlash = 1.0;
            playModeSwitch();
            updateDroneMode(state.gestureMode);
          }
        });

        // 道·目: Show camera toggle if device has camera
        const camBtn = document.getElementById("cam-toggle");
        if (camBtn && navigator.mediaDevices?.getUserMedia) {
          camBtn.style.display = "block";
          camBtn.onclick = () => DaoEye.toggle();
          DaoEye.init(); // pre-load model in background
        }

        // Show fullscreen button (not needed in VR)
        var fsBtn = document.getElementById("fs-toggle");
        if (fsBtn && document.documentElement.requestFullscreen)
          fsBtn.style.display = "block";

        // Show cultivation HUD + device-adaptive controls hint
        document.getElementById("cultivation-hud").style.display = "flex";
        createAtmosphericParticles();
        const hint = document.getElementById("controls-hint");
        // Adapt hint text to device capabilities
        if (Sense.touch && !Sense.fine) {
          hint.innerHTML =
            '<b style="color:#00ff88">触控修仙</b><br/>' +
            "拖动=移动剑阵 双击=切换阵型<br/>" +
            "右划🔥火球 上划⚡雷法 下划❄️冰封 左划⚔️剑气<br/>" +
            (Sense.gyro ? "倾斜手机=瞄准方向<br/>" : "") +
            "📷摄像头手势=手掌控剑";
        } else if (_gp.on) {
          hint.innerHTML =
            '<b style="color:#00ff88">手柄修仙</b><br/>' +
            "左摇杆=移动 右摇杆=瞄准<br/>" +
            "A🔥火球 X⚔️剑气 LB❄️冰封 RB⚡雷法<br/>" +
            "Y=飞行 Select=打坐 B/Start=切阵";
        } else {
          hint.innerHTML =
            '<b style="color:#00ff88">修仙操控</b><br/>WASD移动 Space↑ Shift↓<br/>1🔥火球 2❄️冰封 3⚡雷法 4⚔️剑气<br/>F御剑飞行 M打坐修炼 双击切阵<br/>📷摄像头手势=手掌控剑';
        }
        hint.style.display = "block";
        hint.style.opacity = "1";
        setTimeout(() => {
          hint.style.opacity = "0";
          setTimeout(() => (hint.style.display = "none"), 2000);
        }, 8000);
      }

      function updateFlatMovement(delta) {
        const keys = window._flatKeys;
        if (!keys || !controls || cult.flying) return;
        const speed = 3 * delta;
        camera.getWorldDirection(_fwdVec);
        _fwdVec.y = 0;
        _fwdVec.normalize();
        const forward = _fwdVec;
        _rightVec.crossVectors(forward, _upVec);
        const right = _rightVec;
        // Keyboard WASD
        let fwdAmt = 0,
          rightAmt = 0;
        if (keys["w"]) fwdAmt += 1;
        if (keys["s"]) fwdAmt -= 1;
        if (keys["a"]) rightAmt -= 1;
        if (keys["d"]) rightAmt += 1;
        // Gamepad left stick (blended seamlessly)
        if (keys["_gpY"]) fwdAmt -= keys["_gpY"]; // stick Y is inverted
        if (keys["_gpX"]) rightAmt += keys["_gpX"];
        if (Math.abs(fwdAmt) > 0.01) {
          camera.position.addScaledVector(forward, speed * fwdAmt);
          controls.target.addScaledVector(forward, speed * fwdAmt);
        }
        if (Math.abs(rightAmt) > 0.01) {
          camera.position.addScaledVector(right, speed * rightAmt);
          controls.target.addScaledVector(right, speed * rightAmt);
        }
        if (keys[" "]) {
          camera.position.y += speed;
          controls.target.y += speed;
        }
        if (keys["shift"]) {
          camera.position.y -= speed;
          controls.target.y -= speed;
        }
      }

      // ===== SETUP XR INPUTS AT INIT (D2 fix: must be before session) =====
      _xrModReady
        .then(() => setupXRInputs())
        .catch((e) => console.warn("XR modules unavailable:", e));

      // ===== VR SESSION LIFECYCLE =====
      // VR Tutorial Panel (floating in front of user on first entry)
      let vrTutorialGroup = null;
      let vrTutorialTimer = 0;
      function createVRTutorial() {
        vrTutorialGroup = new THREE.Group();
        const canvas = document.createElement("canvas");
        canvas.width = 768;
        canvas.height = 512;
        const ctx = canvas.getContext("2d");
        // Draw tutorial card
        ctx.fillStyle = "rgba(0,20,10,0.85)";
        ctx.beginPath();
        ctx.roundRect(0, 0, 768, 512, 24);
        ctx.fill();
        ctx.strokeStyle = "rgba(0,255,136,0.4)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(4, 4, 760, 504, 22);
        ctx.stroke();
        ctx.fillStyle = "#00ff88";
        ctx.font = "bold 36px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("御 剑 指 南", 384, 55);
        // Gesture guide
        const gestures = [
          ["🌸", "张掌 (Open Palm)", "莲花现世", "#ffaa44"],
          ["🐉", "剑指 (Sword Finger)", "游龙随行", "#00ff88"],
          ["🛡️", "握拳 (Fist)", "剑盾护体", "#88ccff"],
          ["🤘", "结印 (Rock)", "大庚剑阵", "#ff4488"],

        gestures.forEach(([icon, gesture, name, color], i) => {

          ctx.font = "40px sans-serif";
          ctx.textAlign = "left";

        });

        ctx.font = "20px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(
          "Trigger/Grip=切换阵型 | 摇杆=移动 | 适配所有VR设备",

        const tex = new THREE.CanvasTexture(canvas);

          map: tex,

        vrTutorialTimer = 8.0; // show for 8 seconds
      }

      // Mode switch flash effect
      let modeSwitchFlash = 0;
      const flashMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 8, 8),
        new THREE.MeshBasicMaterial({

      renderer.xr.addEventListener("sessionstart", () => {
        state.isVR = true;

        if (!cult.atmosParticles) createAtmosphericParticles();

        else {
          vrTutorialGroup.visible = true;
          vrTutorialTimer = 8.0;

      });

      renderer.xr.addEventListener("sessionend", () => {
        state.isVR = false;
        document.getElementById("overlay").classList.remove("hidden");
        scene.fog.near = 6;
        scene.fog.far = 40;
        console.log("🖥️ VR session ended");
      });

      // ===== VR BUTTON (D1 fix: use Three.js official VRButton) =====
      const vrBtn = document.getElementById("enterVR");
      const flatBtn = document.getElementById("enterFlat");

      // WebXR features for ALL VR headsets (Quest/Pico/Vision/Vive/Index/WMR)
      const sessionInit = {
        optionalFeatures: [
          "local-floor",
          "bounded-floor",
          "hand-tracking",
          "layers",
          "anchors",
          "plane-detection",
          "mesh-detection",
        ],
        requiredFeatures: ["local-floor"],
      };
      const vrButtonEl = VRButton.createButton(renderer, sessionInit);
      // Style the official VRButton to match our UI, then hide our custom button
      vrButtonEl.style.cssText = "display:none"; // hidden, we use our own styled button
      document.body.appendChild(vrButtonEl);

      // Bridge: our styled button triggers the official VRButton
      async function startVR() {
        try {
          initAudio(); // D3 fix
          vrButtonEl.click(); // delegate to Three.js VRButton which handles all edge cases
        } catch (e) {
          console.error("VR start error:", e);
          alert("VR启动失败: " + e.message);
        }
      }

      // ╔══════════════════════════════════════════════════════════════╗
      // ║  道·自入 Auto-Entry — 无为而入 · The user does nothing     ║
      // ║  Sense → adapt → enter. No buttons needed, no choices.     ║
      // ╚══════════════════════════════════════════════════════════════╝
      async function daoAutoEntry() {
        // Probe XR with retries (works for ALL VR headsets)
        let xrOK = false;
        if (navigator.xr) {
          for (let i = 0; i < 8; i++) {
            try {
              xrOK = await navigator.xr.isSessionSupported("immersive-vr");
              if (xrOK) break;
            } catch (e) {}
            await new Promise((r) => setTimeout(r, 400 * Math.pow(1.5, i)));
          }
        }
        // Fallback: VRButton may have detected it
        if (
          !xrOK &&
          vrButtonEl.textContent &&
          vrButtonEl.textContent.includes("VR")
        )
          xrOK = true;

        const capEl = document.getElementById("overlay")
          ? document.querySelector(".subtitle")
          : null;

        if (xrOK) {
          // VR device detected — enable button but also show capabilities
          vrBtn.textContent = "进入VR修仙";
          vrBtn.disabled = false;
          vrBtn.onclick = startVR;
          if (capEl)
            capEl.innerHTML =
              "大庚剑阵 · VR修仙体验<br/>挥手御剑 · 结印变阵<br/><small style='color:rgba(255,255,255,.35)'>道·感知: " +
              Sense.label +
              "</small>";
          console.log("道·自入 VR可用 ·", Sense.label);
          // On HMD devices, auto-enter VR after brief delay
          if (Sense.hmd) {
            setTimeout(() => {
              if (!flatMode && !state.isVR) {
                try {
                  startVR();
                } catch (e) {}
              }
            }, 2000);
          }
        } else {
          // No VR — auto-enter flat mode
          vrBtn.textContent = Sense.mobile ? "触控进入" : "点击进入";
          vrBtn.disabled = false;
          vrBtn.onclick = () => {
            document.getElementById("overlay").classList.add("hidden");
            enableFlatMode();
          };
          if (capEl)
            capEl.innerHTML =
              "大庚剑阵 · 万设备修仙体验<br/>自动适配一切 · " +
              (Sense.touch ? "触控操作" : "鼠标操作") +
              "<br/><small style='color:rgba(255,255,255,.35)'>道·感知: " +
              Sense.label +
              "</small>";
          console.log("道·自入 平面模式 ·", Sense.label);
          // Auto-enter flat mode after brief display
          setTimeout(
            () => {
              if (!flatMode && !state.isVR) {
                document.getElementById("overlay").classList.add("hidden");
                enableFlatMode();
              }
            },
            Sense.mobile ? 1500 : 2500,
          );
        }
      }
      daoAutoEntry();

      flatBtn.onclick = () => {
        document.getElementById("overlay").classList.add("hidden");
        enableFlatMode();
      };

      // ===== RENDER LOOP =====
      const clock = new THREE.Clock();
      let lastTime = 0;
      const _gpBtnPrev = { rA: false, rB: false, lX: false, lY: false };

      renderer.setAnimationLoop((timestamp, frame) => {
        const time = clock.getElapsedTime();
        const delta = time - lastTime;
        lastTime = time;

        // 道·输入: drain all universal input intents
        drainDaoIntents();

        // XR Hand tracking
        if (state.isVR && frame) {
          let result = null;
          let activeHandIdx = -1;
          for (let hi = 0; hi < 2; hi++) {
            const hand = hi === 0 ? hand1 : hand2;
            if (hand && hand.joints && _jointCount(hand.joints) > 15) {
              result = detectXRHandGesture(hand);
              if (result) {
                activeHandIdx = hi;
                break;
              }
            }
          }

          // Update hand glow spheres
          for (let hi = 0; hi < 2; hi++) {
            const hand = hi === 0 ? hand1 : hand2;
            const glow = hi === 0 ? handGlowL : handGlowR;
            if (hand && hand.joints) {
              const wrist = hand.joints["wrist"];
              if (wrist && wrist.visible) {
                wrist.getWorldPosition(_handGlowPos);
                glow.position.copy(_handGlowPos);
                glow.material.opacity = hi === activeHandIdx ? 0.6 : 0.2;
                glow.scale.setScalar(hi === activeHandIdx ? 2.5 : 1.0);
              }
            }
          }

          if (!result) {
            // Fallback to controller position + thumbstick movement
            const session = renderer.xr.getSession();
            if (session) {
              for (const source of session.inputSources) {
                if (source.gamepad && source.gripSpace) {
                  const gp = source.gamepad;
                  if (gp.axes.length >= 4) {
                    const flyMul = cult.flying ? 4.0 : 1.0;
                    const dx = gp.axes[2] * 0.08 * flyMul;
                    const dy = gp.axes[3] * 0.08 * flyMul;
                    state.targetPosition.x += dx;
                    state.targetPosition.z += dy;
                    // VR flight: move through XR reference space
                    if (
                      cult.flying &&
                      (Math.abs(dx) > 0.001 || Math.abs(dy) > 0.001)
                    ) {
                      try {
                        const baseRef = renderer.xr.getReferenceSpace();
                        if (baseRef) {
                          const off = new XRRigidTransform(
                            { x: -dx, y: 0, z: -dy, w: 1 },
                            _xrIdentityQuat,
                          );
                          renderer.xr.setReferenceSpace(
                            baseRef.getOffsetReferenceSpace(off),
                          );
                        }
                      } catch (e) {}
                      cult.qi = Math.max(0, cult.qi - 2 * delta);
                      if (cult.qi <= 0) toggleFlight();
                    }
                  }
                  // Get controller world position
                  const ctrl =
                    source.handedness === "left" ? controller1 : controller2;
                  if (ctrl) ctrl.getWorldPosition(_ctrlWorldPos);
                  if (_ctrlWorldPos.length() > 0.1) {
                    state.targetPosition.lerp(_ctrlWorldPos, 0.1);
                    state.isTracking = true;
                  }
                  // VR Spell casting: A/X buttons (index 4) = cast spell, B/Y (index 5) = cycle spell / toggle actions
                  if (gp.buttons.length > 4) {
                    if (source.handedness === "right") {
                      if (gp.buttons[4]?.pressed && !_gpBtnPrev.rA) {
                        castSpell(spellOrder[cult.currentSpellIdx]);
                        triggerHaptic(controller2);
                      }
                      _gpBtnPrev.rA = !!gp.buttons[4]?.pressed;
                      if (gp.buttons[5]?.pressed && !_gpBtnPrev.rB) {
                        cult.currentSpellIdx =
                          (cult.currentSpellIdx + 1) % spellOrder.length;
                        showCultMsg(
                          SPELLS[spellOrder[cult.currentSpellIdx]].name,
                        );
                      }
                      _gpBtnPrev.rB = !!gp.buttons[5]?.pressed;
                    } else {
                      if (gp.buttons[4]?.pressed && !_gpBtnPrev.lX) {
                        toggleFlight();
                        triggerHaptic(controller1);
                      }
                      _gpBtnPrev.lX = !!gp.buttons[4]?.pressed;
                      if (gp.buttons[5]?.pressed && !_gpBtnPrev.lY) {
                        toggleMeditation();
                        triggerHaptic(controller1);
                      }
                      _gpBtnPrev.lY = !!gp.buttons[5]?.pressed;
                    }
                  }
                  break;
                }
              }
            }
          } else {
            processHandGesture(result, time);
          }

          // D9: Update teleport system
          updateTeleport(renderer.xr.getSession(), delta);

          // Update VR HUD
          updateVRHud();
        }

        // Animate ground circle + clouds
        groundCircle.rotation.z = time * 0.1;
        groundCircle2.rotation.z = -time * 0.08;
        for (let ci = 0; ci < cloudsGroup.children.length; ci++) {
          const c = cloudsGroup.children[ci];
          c.position.x += Math.sin(time * 0.05 + ci) * 0.003;
          c.position.y += Math.cos(time * 0.03 + ci) * 0.001;
        }

        // T3-1: Direct uniform updates (no scene.traverse)
        if (window._skyUniforms) window._skyUniforms.uTime.value = time;
        if (window._waterUniforms) window._waterUniforms.uTime.value = time;

        // V1: Sword color lerp to mode
        const _mc = _modeColorMap[state.gestureMode] || _modeColorMap.DRAGON;
        swordMat.color.lerp(_mc, 0.06);
        trailMat.color.lerp(_mc, 0.04);

        // VR tutorial fade-out
        if (vrTutorialGroup && vrTutorialTimer > 0) {
          vrTutorialTimer -= delta;
          if (vrTutorialTimer <= 2) {
            const fade = Math.max(0, vrTutorialTimer / 2);
            vrTutorialGroup.userData.sprite.material.opacity = fade * 0.95;
          }
          if (vrTutorialTimer <= 0) vrTutorialGroup.visible = false;
        }

        // Mode switch flash animation
        if (modeSwitchFlash > 0) {
          modeSwitchFlash -= delta * 4;
          flashMesh.material.opacity = Math.max(0, modeSwitchFlash * 0.3);
          flashMesh.position.copy(state.targetPosition);
          flashMesh.scale.setScalar(1 + (1 - modeSwitchFlash) * 3);
          flashMesh.material.color.set(
            modeColors[state.gestureMode] || "#00ff88",
          );
        } else {
          flashMesh.material.opacity = 0;
        }

        // Animate cultivation energy orbs
        for (let oi = 0; oi < orbGroup.children.length; oi++) {
          const orb = orbGroup.children[oi];
          orb.position.y =
            orb.userData.baseY +
            Math.sin(time * orb.userData.speed + orb.userData.phase) * 0.3;
          orb.material.opacity =
            0.3 + Math.sin(time * 1.5 + orb.userData.phase) * 0.2;
        }

        // 道·目: Camera hand gesture tracking (flat devices)
        if (DaoEye.active && flatMode && !state.isVR) {
          const camR = DaoEye.detect(performance.now());
          if (camR) {
            state.isTracking = true;
            const ndc =
              confirmedGesture === "DRAGON" ? camR.indexNDC : camR.palmNDC;
            _ptrVec.set(ndc.x, ndc.y, 0.5).unproject(camera);
            _ptrVec.sub(camera.position).normalize();
            const cd = (1.2 - camera.position.y) / _ptrVec.y || 3;
            _ptrWorldPos
              .copy(camera.position)
              .addScaledVector(_ptrVec, Math.abs(cd));
            state.targetPosition.lerp(_ptrWorldPos, 0.12);
            // Gesture debounce (same as XR hand tracking)
            if (camR.gesture !== pendingGesture) {
              pendingGesture = camR.gesture;
              gestureStartTime = time;
            } else if (
              time - gestureStartTime > GESTURE_DELAY &&
              camR.gesture !== confirmedGesture
            ) {
              confirmedGesture = camR.gesture;
              state.gestureMode = camR.gesture;
              modeSwitchFlash = 1.0;
              playModeSwitch();
              updateDroneMode(state.gestureMode);
            }
            // Dragon path update
            if (confirmedGesture === "DRAGON") {
              const last = state.pathHistory[0];
              _handDiffVec.copy(state.targetPosition).sub(last);
              if (_handDiffVec.length() > 0.01) {
                state.lastDirection.copy(_handDiffVec.normalize());
                const _hRec = state.pathHistory.pop();
                _hRec.copy(state.targetPosition);
                state.pathHistory.unshift(_hRec);
              }
            }
          }
        }

        // Cultivation updates (flat mode)
        if (!state.isVR) {
          if (cult.flying) updateFlight(delta);
          else updateFlatMovement(delta);
        }
        updateSpellParticles(delta);
        updateMeditation(time, delta);
        updateAtmosParticles(time, delta);

        updateSwords(time, delta);
        updateTrails(delta);
        updateLightning(time);
        updateMagicCircle(time);
        updateSpirits(time);
        updateUI();

        if (controls) controls.update();

        updateFPSDisplay();
        renderer.render(scene, camera);
      });

      // ===== RESIZE =====
      window.addEventListener("resize", () => {
        const w = window.innerWidth,
          h = window.innerHeight;
        if (w > 0 && h > 0) {
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
          renderer.setSize(w, h);
        }
      });

      // D7 fix: FPS display using render loop frame counting (no setInterval)
      let fpsFrameCount = 0,
        fpsLastTime = performance.now(),
        lastDisplayFPS = 0;
      function updateFPSDisplay() {
        fpsFrameCount++;
        const now = performance.now();
        const elapsed = (now - fpsLastTime) / 1000;
        if (elapsed >= 1) {
          const fps = Math.round(fpsFrameCount / elapsed);
          lastDisplayFPS = fps;
          if (!state.isVR) {
            infoEl.textContent = `${adaptiveSwordCount} swords | ${fps} FPS | ${Sense.label}`;
          }
          adaptPerformance(fps);
          fpsFrameCount = 0;
          fpsLastTime = now;
        }
      }

      console.log("🗡️ VR大庚剑阵 loaded. Swords:", CFG.swordCount);
    </script>
  </body>
</html>
