<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no"
    />
    <title>修仙界 · WorldLabs × VR仙侠</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        color: #fff;
        font-family: "Microsoft YaHei", sans-serif;
        overflow: hidden;
      }
      #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 1;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Overlay UI */
      #overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at center,
          rgba(5, 10, 30, 0.85),
          rgba(0, 0, 0, 0.95)
        );
        transition: opacity 0.6s;
      }
      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
      }
      #overlay h1 {
        font-size: clamp(28px, 5vw, 48px);
        background: linear-gradient(135deg, #00ff88, #88ccff, #ffaa44);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 12px;
        text-align: center;
      }
      #overlay p {
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        margin-bottom: 24px;
        text-align: center;
        max-width: 500px;
        line-height: 1.6;
      }

      /* Scene gallery */
      #scene-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
        max-width: 700px;
        width: 90%;
        max-height: 45vh;
        overflow-y: auto;
        padding: 8px;
        margin-bottom: 20px;
      }
      .scene-card {
        position: relative;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        aspect-ratio: 16/10;
        border: 2px solid rgba(0, 255, 136, 0.2);
        transition: all 0.3s;
      }
      .scene-card:hover {
        border-color: #00ff88;
        transform: scale(1.03);
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
      }
      .scene-card.active {
        border-color: #ffaa44;
        box-shadow: 0 0 25px rgba(255, 170, 68, 0.4);
      }
      .scene-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .scene-card .label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 4px 6px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        font-size: 10px;
        line-height: 1.2;
      }

      /* Buttons */
      .btn {
        padding: 12px 32px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
        font-family: inherit;
      }
      .btn-vr {
        background: linear-gradient(135deg, #00ff88, #00cc66);
        color: #000;
        font-weight: bold;
      }
      .btn-vr:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
      }
      .btn-flat {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        margin-left: 12px;
      }
      .btn-flat:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }

      /* HUD */
      #hud {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 50;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .hud-pill {
        padding: 5px 12px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 15px;
        font-size: 11px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      #scene-switcher {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        display: flex;
        gap: 6px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 20px;
        backdrop-filter: blur(8px);
        max-width: 90vw;
        overflow-x: auto;
      }
      #VRButton {
        z-index: 1 !important;
      }
      .scene-dot {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.3);
        cursor: pointer;
        overflow: hidden;
        transition: all 0.3s;
        flex-shrink: 0;
      }
      .scene-dot:hover,
      .scene-dot.active {
        border-color: #00ff88;
        transform: scale(1.15);
      }
      .scene-dot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Loading */
      #loading-bar {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        background: linear-gradient(90deg, #00ff88, #88ccff);
        z-index: 200;
        transition: width 0.3s;
        width: 0;
      }
      #loading-text {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 200;
        font-size: 18px;
        text-shadow: 0 0 20px #00ff88;
        display: none;
        pointer-events: none;
      }

      /* Mode indicator */
      #mode-indicator {
        position: fixed;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        padding: 8px 20px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 20px;
        font-size: 14px;
        backdrop-filter: blur(8px);
        text-align: center;
        transition: all 0.3s;
      }

      /* ===== CULTIVATION SYSTEM ===== */
      #cultivation-hud {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 60;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        pointer-events: none;
      }
      #qi-bar-container {
        width: 280px;
        height: 14px;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 7px;
        border: 1px solid rgba(0, 200, 255, 0.3);
        overflow: hidden;
        backdrop-filter: blur(4px);
      }
      #qi-bar {
        height: 100%;
        background: linear-gradient(90deg, #0088ff, #00ccff, #88eeff);
        border-radius: 7px;
        transition: width 0.3s;
        width: 100%;
        box-shadow: 0 0 10px rgba(0, 136, 255, 0.5);
      }
      #realm-display {
        font-size: 13px;
        color: #88eeff;
        text-shadow: 0 0 15px rgba(0, 200, 255, 0.6);
        letter-spacing: 2px;
        font-weight: bold;
      }
      #skill-bar {
        display: flex;
        gap: 6px;
        pointer-events: auto;
      }
      .skill-slot {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        cursor: pointer;
        position: relative;
        transition: all 0.2s;
        backdrop-filter: blur(4px);
      }
      .skill-slot:hover {
        border-color: #00ff88;
        transform: scale(1.1);
      }
      .skill-slot.active {
        border-color: #ffaa44;
        box-shadow: 0 0 15px rgba(255, 170, 68, 0.4);
      }
      .skill-slot.cooldown {
        opacity: 0.5;
      }
      .skill-slot .cd-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 0 0 6px 6px;
        display: none;
        transition: height 0.1s;
      }
      .skill-slot .key-hint {
        position: absolute;
        top: -8px;
        right: -4px;
        font-size: 9px;
        background: rgba(0, 0, 0, 0.8);
        padding: 1px 4px;
        border-radius: 4px;
        color: #aaa;
      }
      #fly-indicator {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 55;
        display: none;
        font-size: 22px;
        color: #00ccff;
        text-shadow: 0 0 30px #0088ff;
        animation: flyPulse 1.5s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes flyPulse {
        0%,
        100% {
          opacity: 0.6;
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.1);
        }
      }
      #spell-flash {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .flash-fire {
        background: radial-gradient(
          circle at center,
          rgba(255, 100, 0, 0.3),
          transparent 70%
        );
      }
      .flash-ice {
        background: radial-gradient(
          circle at center,
          rgba(0, 180, 255, 0.3),
          transparent 70%
        );
      }
      .flash-lightning {
        background: radial-gradient(
          circle at center,
          rgba(200, 150, 255, 0.4),
          transparent 70%
        );
      }
      .flash-sword {
        background: radial-gradient(
          circle at center,
          rgba(0, 255, 136, 0.3),
          transparent 70%
        );
      }
      #breakthrough {
        position: fixed;
        inset: 0;
        z-index: 300;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: radial-gradient(
          ellipse,
          rgba(255, 215, 0, 0.15),
          rgba(0, 0, 0, 0.95)
        );
        animation: btFade 3s forwards;
        pointer-events: none;
      }
      @keyframes btFade {
        0% {
          opacity: 0;
        }
        15% {
          opacity: 1;
        }
        85% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      #breakthrough h2 {
        font-size: 36px;
        color: #ffd700;
        text-shadow: 0 0 40px #ffd700;
        margin-bottom: 12px;
      }
      #breakthrough p {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.8);
      }
      .nav-link {
        display: inline-block;
        margin-top: 16px;
        padding: 8px 24px;
        font-size: 13px;
        color: #88ccff;
        border: 1px solid rgba(136, 204, 255, 0.3);
        border-radius: 25px;
        text-decoration: none;
        transition: all 0.3s;
      }
      .nav-link:hover {
        background: rgba(136, 204, 255, 0.1);
        border-color: #88ccff;
        color: #bbddff;
      }
      @keyframes btShake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px) rotate(-0.5deg);
        }
        75% {
          transform: translateX(4px) rotate(0.5deg);
        }
      }
      #med-vignette {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.8s;
        background: radial-gradient(
          ellipse at center,
          transparent 50%,
          rgba(0, 100, 255, 0.12) 100%
        );
      }
      #med-vignette.active {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="loading-bar"></div>
    <div id="loading-text">⏳ 加载修仙界...</div>

    <div id="overlay">
      <h1>修仙界 · 万界穿梭</h1>

    <script>
      // === PRE-MODULE DIAGNOSTIC (visible on-screen, no CDP needed) ===
      (function () {
        var diag = {
          errors: [],
          network: {},
          moduleOk: false,
          startMs: Date.now(),
        };
        window._DIAG = diag;
        // Capture all errors
        window.onerror = function (msg, src, line, col, err) {
          diag.errors.push("[ERR] " + msg + " @" + src + ":" + line);
          updateDiagUI();
        };
        window.addEventListener("unhandledrejection", function (e) {
          diag.errors.push(
            "[REJ] " + (e.reason?.message || e.reason || "unknown"),
          );
          updateDiagUI();
        });
        // Create visible diagnostic panel
        var panel = document.createElement("div");
        panel.id = "diag-panel";
        panel.style.cssText =
          "position:fixed;top:0;right:0;z-index:99999;background:rgba(0,0,0,0.95);color:#0f0;font:bold 14px monospace;padding:12px;max-width:50vw;max-height:100vh;overflow:auto;white-space:pre-wrap;pointer-events:none;";
        document.addEventListener("DOMContentLoaded", function () {
          document.body.appendChild(panel);
          // Test CDN reachability
          var cdns = [
            [
              "unpkg THREE",
              "https://unpkg.com/three@0.178.0/build/three.module.js",
            ],
            [
              "unpkg Spark",
              "https://unpkg.com/@sparkjsdev/spark@0.1.10/dist/spark.module.js",
            ],
            [
              "CDN marble",
              "https://cdn.marble.worldlabs.ai/17f76543-a07f-4447-adb0-38a529b9e672/81014abb_image_prompt_sanitized.png",
            ],
            [
              "jsdelivr THREE",
              "https://cdn.jsdelivr.net/npm/three@0.178.0/build/three.module.js",
            ],
          ];
          cdns.forEach(function (c) {
            var t0 = Date.now();
            fetch(c[1], { method: "HEAD", mode: "cors" })
              .then(function (r) {
                diag.network[c[0]] = r.status + " " + (Date.now() - t0) + "ms";
                updateDiagUI();
              })
              .catch(function (e) {
                diag.network[c[0]] =
                  "FAIL:" +
                  e.message.substring(0, 40) +
                  " " +
                  (Date.now() - t0) +
                  "ms";
                updateDiagUI();
              });
          });
          // Module load timeout check
          setTimeout(function () {
            if (!diag.moduleOk) {
              diag.errors.push(
                "[TIMEOUT] Module script did not execute in 15s",
              );
              updateDiagUI();
            }
          }, 15000);
          updateDiagUI();
        });
        function updateDiagUI() {
          var p = document.getElementById("diag-panel");
          if (!p) return;
          // Auto-hide after module loads OK (5s fade delay + 1s transition)
          if (diag.moduleOk && !diag._hiding) {
            diag._hiding = true;
            p.style.transition = "opacity 1s";
            setTimeout(function () {
              p.style.opacity = "0";
              setTimeout(function () {
                p.style.display = "none";
              }, 1000);
            }, 4000);
          }
          var elapsed = ((Date.now() - diag.startMs) / 1000).toFixed(1);
          var lines = ["=== DIAG " + elapsed + "s ==="];
          lines.push("UA: " + (navigator.userAgent || "").substring(0, 60));
          lines.push("Module: " + (diag.moduleOk ? "OK" : "PENDING"));
          lines.push(
            "WebGL: " +
              (function () {
                try {
                  var c = document.createElement("canvas");
                  return c.getContext("webgl2")
                    ? "webgl2"
                    : c.getContext("webgl")
                      ? "webgl1"
                      : "NONE";
                } catch (e) {
                  return "ERR";
                }
              })(),
          );
          lines.push("--- Network ---");
          for (var k in diag.network) lines.push(k + ": " + diag.network[k]);
          if (diag.errors.length) {
            lines.push("--- Errors (" + diag.errors.length + ") ---");
            diag.errors.slice(-8).forEach(function (e) {
              lines.push(e.substring(0, 100));
            });
          }
          p.textContent = lines.join("\n");
        }
        window._updateDiag = updateDiagUI;
      })();
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.178.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.178.0/examples/jsm/",
          "@sparkjsdev/spark": "https://unpkg.com/@sparkjsdev/spark@0.1.10/dist/spark.module.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import {
        SparkRenderer,
        VRButton,
        XrHands,
        FpsMovement,
      } from "@sparkjsdev/spark";

      // Signal to diagnostic that module loaded OK (auto-hide handled by updateDiagUI)
      if (window._DIAG) {
        window._DIAG.moduleOk = true;
        window._DIAG.errors.push("[OK] ES modules loaded");
        var dp = document.getElementById("diag-panel");
        if (dp) dp.style.color = "#0f0";
        if (window._updateDiag) window._updateDiag();
      }

      // ===== CONFIGURATION =====
      const IS_MOBILE = (() => {
        if (
          /Android|Quest|Oculus|iPhone|iPad|iPod|webOS|BlackBerry/i.test(
            navigator.userAgent,
          )
        )
          return true;
        if (
          navigator.maxTouchPoints > 1 &&
          !matchMedia("(pointer:fine)").matches
        )
          return true;
        return window.innerWidth < 768;
      })();
      // 道·感知: GPU能力自适应 — 唯变所适
      const _GPU_QUALITY = (() => {
        try {
          if (IS_MOBILE) return "low";
          const c = document.createElement("canvas");
          const gl = c.getContext("webgl2") || c.getContext("webgl");
          if (!gl) return "low";
          const ext = gl.getExtension("WEBGL_debug_renderer_info");
          if (!ext) return "low";
          const gpu = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
          if (
            /RTX|RX\s[6-9]|Radeon\s[6-9]|Apple M[2-9]|Adreno 7[4-9]/i.test(gpu)
          )
            return "medium";
          return "low";
        } catch (e) {
          return "low";
        }
      })();
      const CFG = {
        swordCount: IS_MOBILE ? 40 : 120,
        trailLength: IS_MOBILE ? 8 : 20,
        pathHistoryLength: 60,
        spiritCount: IS_MOBILE ? 3 : 6,
        defaultWorldId: "17f76543-a07f-4447-adb0-38a529b9e672", // 云端仙宫
      };

      // ===== STATE =====
      const state = {

      let _loadingWorld = false;
      async function loadWorld(worldId, quality = "low") {
        if (_loadingWorld) return; // Prevent concurrent loads
        _loadingWorld = true;
        showLoading(true, "获取场景数据...");
        setLoadProgress(10);

        try {
          // Use embedded data first, fall back to Hub API
          let world = EMBEDDED_SCENES.find((s) => s.id === worldId);
          if (!world && IS_LOCALHOST) {
            const resp = await fetch(`/api/world/${worldId}`);
            world = await resp.json();
          }
          if (!world || world.error)
            throw new Error(world?.error || "Scene not found");

          state.currentWorldId = worldId;
          if (_hudSceneEl)
            _hudSceneEl.textContent = SCENE_CN[worldId] || `🌍 ${world.name}`;

          // Remove previous splat
          if (state.currentSplat) {
            scene.remove(state.currentSplat);
            if (state.currentSplat.dispose) state.currentSplat.dispose();
            state.currentSplat = null;
          }
          // 道·净: Reset localFrame to origin on scene switch
          localFrame.position.set(0, 0, 0);
          lastCameraPos.set(0, 0, 0);
          // Clean up previous fallback panorama textures
          if (scene.background && scene.background.isTexture) {
            scene.background.dispose();
            scene.background = null;
          }
          if (scene.environment && scene.environment.isTexture) {
            scene.environment.dispose();
            scene.environment = null;
          }

          setLoadProgress(30);
          showLoading(true, "加载Gaussian Splat...");

          // Get SPZ URL by quality — fallback chain: requested → low
          const qualityMap = { low: "low", medium: "medium", high: "high" };
          let actualQuality = quality;
          let spzUrl = world.spz[qualityMap[quality]];
          if (!spzUrl && quality !== "low") {
            spzUrl = world.spz.low;
            actualQuality = "low";
          }
          if (!spzUrl && quality !== "high") {
            spzUrl = world.spz.high;
            actualQuality = "high";
          }

          if (!spzUrl) {
            throw new Error("No SPZ URL available for this world");
          }

          // CDN access strategy: always try direct CDN (CORS-friendly, works on HTTPS + most localhost)
          console.log("🌐 SPZ direct CDN:", spzUrl.substring(0, 80));

          // Try loading via SparkJS
          if (SplatMesh) {
            try {
              const splat = new SplatMesh({ url: spzUrl });

              // Apply world scale — metric_scale_factor converts splat to meters
              const scale = world.scale || 1.0;
              splat.scale.setScalar(scale);

              // Position splat so ground plane aligns with Y=0
              // ground_plane_offset = distance from scene center to ground (in local coords)
              // After scale, ground is at local_y * scale below origin → lift scene UP
              const groundOff = (world.ground_offset || 0) * scale;
              splat.position.y = groundOff;

              // 道·正位: WorldLabs SPZ uses THREE.js convention (Y-up) — no rotation needed
              splat.quaternion.identity();

              scene.add(splat);
              state.currentSplat = splat;

              setLoadProgress(90);
              showLoading(true, "场景就绪!");

              // 道·归位: Camera at capture viewpoint with natural pullback — 万物各归其位
              // groundOff = capture eye height above Y=0; camera belongs there
              // pullback proportional to scale → same perceived distance in all scenes
              const eyeY = groundOff || 1.6;
              const pullback = Math.max(0.5, scale * 0.8);
              const lookDist = Math.max(2, scale * 2);
              state.playerPos.set(0, eyeY, pullback);
              camera.position.set(0, eyeY, pullback);
              camera.fov = IS_MOBILE ? 65 : 60;
              camera.near = Math.max(0.01, scale * 0.005);
              camera.far = Math.max(1000, eyeY * 5, scale * 100);
              camera.updateProjectionMatrix();
              if (controls) {
                // Look forward into the scene, slightly below eye level
                controls.target.set(0, eyeY * 0.92, -lookDist);
                controls.minDistance = 0;
                controls.maxDistance = Math.max(100, scale * 30);
                controls.autoRotate = true;
                controls.autoRotateSpeed = 0.25;
                controls.update();
              }
              console.log(
                `🎯 道·归位: eyeY=${eyeY.toFixed(1)} scale=${scale.toFixed(2)} groundOff=${groundOff.toFixed(1)} pullback=${pullback.toFixed(1)} lookDist=${lookDist.toFixed(1)}`,
              );
              // 道·境: Scene-adaptive atmosphere
              const atmo = SCENE_ATMOSPHERE[worldId];
              if (atmo) {
                scene.background = new THREE.Color(atmo.bg);
                scene.fog = new THREE.Fog(
                  atmo.fog,
                  atmo.fogNear || 60,
                  atmo.fogFar || 400,
                );
                mainLight.intensity = atmo.light || 1.2;
              } else {
                scene.background = new THREE.Color("#050a1e");
                scene.fog.near = 80;
                scene.fog.far = 500;
              }

              setTimeout(() => {
                setLoadProgress(100);
                showLoading(false);
              }, 500);

              console.log(
                `✅ World loaded: ${world.name} (${actualQuality}${actualQuality !== quality ? ", requested " + quality : ""})`,
              );
              if (actualQuality !== quality) state.quality = actualQuality;
              updateSceneSwitcher();
              updateQualityHUD();
              return true;
            } catch (splatErr) {
              console.warn("SparkJS SplatMesh failed:", splatErr);
            }
          }

          // Fallback: show panorama/thumbnail as skybox
          if (world.thumbnail) {
            showLoading(true, "降级: 加载全景图...");
            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin("anonymous");
            const tex = await new Promise((resolve, reject) => {
              loader.load(world.thumbnail, resolve, undefined, reject);
            });
            tex.mapping = THREE.EquirectangularReflectionMapping;
            scene.background = tex;
            scene.environment = tex;
            setLoadProgress(100);
            showLoading(false);
            console.log(`⚠️ Fallback panorama loaded: ${world.name}`);
            return true;
          }

          throw new Error("No renderable assets");
        } catch (e) {
          console.error("World load error:", e);
          showLoading(true, `❌ 加载失败: ${e.message}`);
          setTimeout(() => showLoading(false), 3000);
          return false;
        } finally {
          _loadingWorld = false;
        }
      }

      // ===== SWORD FORMATION SYSTEM (from VR仙侠 v7.0) =====
      const swordGeo = new THREE.ConeGeometry(0.015, 0.25, 4);
      swordGeo.rotateX(Math.PI / 2);
      const swordMat = new THREE.MeshStandardMaterial({
        color: 0x00ff88,
        emissive: 0x00ff88,
        emissiveIntensity: 0.6,
        metalness: 0.9,
        roughness: 0.1,
        transparent: true,
        opacity: 0.9,
      });
      const swordMesh = new THREE.InstancedMesh(
        swordGeo,
        swordMat,
        CFG.swordCount,
      );
      swordMesh.frustumCulled = false;
      scene.add(swordMesh);

      const trailGeo = new THREE.BufferGeometry();
      const trailPositions = new Float32Array(
        CFG.swordCount * CFG.trailLength * 3,
      );
      const trailOpacities = new Float32Array(CFG.swordCount * CFG.trailLength);
      trailGeo.setAttribute(
        "position",
        new THREE.BufferAttribute(trailPositions, 3),
      );
      trailGeo.setAttribute(
        "opacity",
        new THREE.BufferAttribute(trailOpacities, 1),
      );
      const trailMat = new THREE.PointsMaterial({
        color: 0x00ff88,
        size: 0.02,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending,
      });
      const trailPoints = new THREE.Points(trailGeo, trailMat);
      scene.add(trailPoints);

      // Magic circle ground effect
      const circleGeo = new THREE.RingGeometry(1.5, 2.0, 64);
      const circleMat = new THREE.MeshBasicMaterial({
        color: 0x00ff88,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
      });
      const magicCircle = new THREE.Mesh(circleGeo, circleMat);
      magicCircle.rotation.x = -Math.PI / 2;
      magicCircle.position.y = 0.01;
      scene.add(magicCircle);

      // Simplex noise approximation
      const noise3D = (x, y, z) =>
        Math.sin(x * 1.2 + y * 0.8) *
        Math.cos(y * 1.1 + z * 0.9) *
        Math.sin(z * 0.7 + x * 1.3);

      const dummy = new THREE.Object3D();
      const _tmpColor = new THREE.Color();
      let currentScales = new Float32Array(CFG.swordCount).fill(1);
      // P2+P3+P4: Pre-allocated temp vectors (avoid per-frame GC pressure)
      const _xCurrentTarget = new THREE.Vector3();
      const _xTmpDir = new THREE.Vector3();
      const _xTmpTangent = new THREE.Vector3();
      const _xFwdVec = new THREE.Vector3();
      const _xRightVec = new THREE.Vector3();
      const _xUpVec = new THREE.Vector3(0, 1, 0);
      const _xCtrlPos = new THREE.Vector3();
      const _xSpellOrigin = new THREE.Vector3();
      let _frameCount = 0;
      let adaptiveSwordCount = CFG.swordCount;

      function updateSwords(time, delta) {
        const dt = Math.min(delta, 1 / 30);
        const target = state.targetPosition;
        const mode = state.gestureMode;
        const tracking = state.isTracking;
        const history = state.pathHistory;

        // Swords always orbit around camera/player position (inside the scene)
        const camPos = camera.position;
        _xCurrentTarget.copy(target);
        let currentTarget = _xCurrentTarget;
        if (!tracking) {
          currentTarget.set(
            Math.sin(time * 0.5) * 0.8 + camPos.x,
            camPos.y + Math.cos(time * 0.4) * 0.5,
            camPos.z - 2 + Math.sin(time * 0.3) * 0.4,
          );
        } else {
          // In tracking mode, offset target relative to camera
          currentTarget.x += camPos.x;
          currentTarget.y += camPos.y - 1.5;
          currentTarget.z += camPos.z;
        }

        // P5: Reuse popped Vector3 (circular buffer)
        const _histRecycle = history.pop();
        _histRecycle.copy(currentTarget);
        history.unshift(_histRecycle);

        _tmpColor.set(modeColors[mode] || "#00ff88");
        swordMat.color.copy(_tmpColor);
        swordMat.emissive.copy(_tmpColor);
        trailMat.color.copy(_tmpColor);

        swordMesh.count = adaptiveSwordCount;
        for (let i = 0; i < adaptiveSwordCount; i++) {
          const t = i / CFG.swordCount;
          const angle = t * Math.PI * 2;

          let px, py, pz, lx, ly, lz;
          if (mode === "LOTUS") {
            const r = 1.2 + Math.sin(time * 2 + t * 6) * 0.3;
            const h = Math.sin(t * Math.PI * 4 + time) * 0.4;
            px = currentTarget.x + Math.cos(angle + time * 0.5) * r;
            py = currentTarget.y + h;
            pz = currentTarget.z + Math.sin(angle + time * 0.5) * r;
            lx = currentTarget.x;
            ly = currentTarget.y;
            lz = currentTarget.z;
          } else if (mode === "DRAGON") {
            const histIdx = Math.min(
              Math.floor(t * history.length * 0.8),
              history.length - 1,
            );
            const hp = history[histIdx];
            const r = 0.3 + Math.sin(time * 3 + t * 10) * 0.15;
            px = hp.x + Math.cos(angle * 3 + time * 2) * r;
            py = hp.y + Math.sin(angle * 2 + time * 3) * r * 0.5;
            pz = hp.z + Math.sin(angle * 3 + time * 2) * r;
            const nextIdx = Math.min(histIdx + 1, history.length - 1);
            _xTmpDir.copy(history[nextIdx]).sub(hp);
            const dir = _xTmpDir;
            if (dir.lengthSq() < 0.0001) dir.set(0, 0, -1);
            else dir.normalize();
            lx = px + dir.x;
            ly = py + dir.y;
            lz = pz + dir.z;
          } else if (mode === "SHIELD") {
            const r = 1.8;
            const theta = Math.acos(1 - 2 * t);
            const phi = angle * 3 + time * 0.3;
            px = currentTarget.x + r * Math.sin(theta) * Math.cos(phi);
            py = currentTarget.y + r * Math.cos(theta) * 0.8;
            pz = currentTarget.z + r * Math.sin(theta) * Math.sin(phi);
            lx = currentTarget.x;
            ly = currentTarget.y;
            lz = currentTarget.z;
          } else {
            // DAGENG
            const layer = Math.floor(t * 5);
            const lt = (t * 5) % 1;
            const layerAngle = lt * Math.PI * 2 + time * (1 + layer * 0.5);
            const r = 0.8 + layer * 0.6;
            px = currentTarget.x + Math.cos(layerAngle) * r;
            py =
              currentTarget.y +
              (layer - 2) * 0.5 +
              Math.sin(time * 2 + lt * 4) * 0.1;
            pz = currentTarget.z + Math.sin(layerAngle) * r;
            _xTmpTangent.set(-Math.sin(layerAngle), 0, Math.cos(layerAngle));
            const tangent = _xTmpTangent;
            lx = px + tangent.x;
            ly = py + tangent.y;
            lz = pz + tangent.z;
          }

          dummy.position.set(px, py, pz);
          dummy.lookAt(lx, ly, lz);
          const targetScale = 0.8 + noise3D(px, py + time, pz) * 0.4;
          currentScales[i] += (targetScale - currentScales[i]) * dt * 5;
          dummy.scale.setScalar(currentScales[i]);
          dummy.updateMatrix();
          swordMesh.setMatrixAt(i, dummy.matrix);

          // Trail update
          const base = i * CFG.trailLength * 3;
          const oBase = i * CFG.trailLength;
          for (let j = CFG.trailLength - 1; j > 0; j--) {
            trailPositions[base + j * 3] = trailPositions[base + (j - 1) * 3];
            trailPositions[base + j * 3 + 1] =
              trailPositions[base + (j - 1) * 3 + 1];
            trailPositions[base + j * 3 + 2] =
              trailPositions[base + (j - 1) * 3 + 2];
            trailOpacities[oBase + j] = trailOpacities[oBase + j - 1] * 0.92;
          }
          trailPositions[base] = px;
          trailPositions[base + 1] = py;
          trailPositions[base + 2] = pz;
          trailOpacities[oBase] = 0.5;
        }
        swordMesh.instanceMatrix.needsUpdate = true;
        trailGeo.attributes.position.needsUpdate = true;
        trailGeo.attributes.opacity.needsUpdate = true;

        // Magic circle follows camera
        magicCircle.position.x = camPos.x;
        magicCircle.position.y = camPos.y - 1.5;
        magicCircle.position.z = camPos.z;
        magicCircle.rotation.z = time * 0.1;
        circleMat.color.copy(_tmpColor);
      }

      // ===== ATMOSPHERIC SPIRITUAL ENERGY =====
      function createAtmosphericParticles() {
        const N = IS_MOBILE ? 80 : 200;
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(N * 3),
          col = new Float32Array(N * 3),
          vel = new Float32Array(N * 3);
        for (let i = 0; i < N; i++) {
          pos[i * 3] = (Math.random() - 0.5) * 30;
          pos[i * 3 + 1] = Math.random() * 15;
          pos[i * 3 + 2] = (Math.random() - 0.5) * 30;
          const c = new THREE.Color().setHSL(
            0.5 + Math.random() * 0.2,
            0.6,
            0.7,
          );
          col[i * 3] = c.r;
          col[i * 3 + 1] = c.g;
          col[i * 3 + 2] = c.b;
          vel[i * 3] = (Math.random() - 0.5) * 0.3;
          vel[i * 3 + 1] = 0.1 + Math.random() * 0.3;
          vel[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
        }
        geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
        const mat = new THREE.PointsMaterial({
          size: 0.05,
          vertexColors: true,
          transparent: true,
          opacity: 0.4,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const pts = new THREE.Points(geo, mat);
        pts.userData.vel = vel;
        scene.add(pts);
        cult.atmosParticles = pts;
      }
      function updateAtmosParticles(time, dt) {
        const p = cult.atmosParticles;
        if (!p) return;
        const pos = p.geometry.attributes.position.array,
          vel = p.userData.vel,
          cam = camera.position,
          N = pos.length / 3;
        for (let i = 0; i < N; i++) {
          pos[i * 3] += vel[i * 3] * dt;
          pos[i * 3 + 1] += vel[i * 3 + 1] * dt;
          pos[i * 3 + 2] += vel[i * 3 + 2] * dt;
          if (Math.abs(pos[i * 3] - cam.x) > 15)
            pos[i * 3] = cam.x + (Math.random() - 0.5) * 30;
          if (pos[i * 3 + 1] > 15 || pos[i * 3 + 1] < -1) {
            pos[i * 3 + 1] = Math.random() * 2;
            vel[i * 3 + 1] = 0.1 + Math.random() * 0.3;
          }
          if (Math.abs(pos[i * 3 + 2] - cam.z) > 15)
            pos[i * 3 + 2] = cam.z + (Math.random() - 0.5) * 30;
          vel[i * 3] += (Math.random() - 0.5) * dt * 0.5;
          vel[i * 3 + 2] += (Math.random() - 0.5) * dt * 0.5;
        }
        p.geometry.attributes.position.needsUpdate = true;
        p.material.opacity = 0.3 + Math.sin(time * 0.5) * 0.1;
      }

      // ===== SPELL SYSTEM =====
      function castSpell(type) {
        const sp = SPELLS[type];
        if (!sp) return;
        if (cult.cds[type] > 0) return;
        if (cult.qi < sp.cost) {
          showCultMsg("灵力不足！");
          playQiWarning();
          return;
        }
        cult.qi -= sp.cost;
        cult.cds[type] = sp.cd;
        cult.exp += sp.cost * 0.5;
        updateQiBar();
        checkBreakthrough();
        _spellFlashEl.className = "";
        void _spellFlashEl.offsetWidth;
        _spellFlashEl.className = "flash-" + type;
        _spellFlashEl.style.opacity = "1";
        setTimeout(() => (_spellFlashEl.style.opacity = "0"), 150);
        playSpellSound(type);
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        _xSpellOrigin.copy(camera.position).addScaledVector(dir, 0.5);
        const origin = _xSpellOrigin;
        const N = sp.count;
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(N * 3),
          velocities = new Float32Array(N * 3);
        for (let i = 0; i < N; i++) {
          positions[i * 3] = origin.x + (Math.random() - 0.5) * 0.3;
          positions[i * 3 + 1] = origin.y + (Math.random() - 0.5) * 0.3;
          positions[i * 3 + 2] = origin.z + (Math.random() - 0.5) * 0.3;
          velocities[i * 3] = dir.x * sp.speed + (Math.random() - 0.5) * 3;
          velocities[i * 3 + 1] = dir.y * sp.speed + (Math.random() - 0.5) * 3;
          velocities[i * 3 + 2] = dir.z * sp.speed + (Math.random() - 0.5) * 3;
        }
        geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({
          color: new THREE.Color(sp.color),
          size: sp.size,
          transparent: true,
          opacity: 0.9,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const pts = new THREE.Points(geo, mat);
        pts.userData = { vel: velocities, life: 2.0, maxLife: 2.0 };
        scene.add(pts);
        cult.spellParticles.push(pts);
        const _s = _slotCache[type];
        if (_s) {
          _s.slot.classList.add("active");
          setTimeout(() => _s.slot.classList.remove("active"), 300);
        }
      }
      function updateSpells(dt) {
        for (let i = cult.spellParticles.length - 1; i >= 0; i--) {
          const p = cult.spellParticles[i];
          p.userData.life -= dt;
          if (p.userData.life <= 0) {
            scene.remove(p);
            p.geometry.dispose();
            p.material.dispose();
            cult.spellParticles.splice(i, 1);
            continue;
          }
          const pos = p.geometry.attributes.position.array,
            vel = p.userData.vel,
            N = pos.length / 3;
          const frac = p.userData.life / p.userData.maxLife;
          p.material.opacity = frac * 0.9;
          for (let j = 0; j < N; j++) {
            pos[j * 3] += vel[j * 3] * dt;
            pos[j * 3 + 1] += vel[j * 3 + 1] * dt - 0.5 * dt;
            pos[j * 3 + 2] += vel[j * 3 + 2] * dt;
            vel[j * 3] *= 1 - dt * 0.5;
            vel[j * 3 + 1] *= 1 - dt * 0.5;
            vel[j * 3 + 2] *= 1 - dt * 0.5;
          }
          p.geometry.attributes.position.needsUpdate = true;
        }
        for (const k in cult.cds) {
          if (cult.cds[k] > 0) {
            cult.cds[k] = Math.max(0, cult.cds[k] - dt);
            const cached = _slotCache[k];
            if (cached) {
              const cd = cached.cd;
              if (cult.cds[k] > 0) {
                cd.style.display = "block";
                cd.style.height = (cult.cds[k] / SPELLS[k].cd) * 100 + "%";
              } else {
                if (cd.style.display === "block") playCdReady();
                cd.style.display = "none";
              }
            }
          }
        }
        if (!cult.meditating)
          cult.qi = Math.min(cult.maxQi, cult.qi + cult.qiRegen * dt);
        if (cult.qi < cult.maxQi * 0.15 && cult.qi > 0) playQiWarning();
        updateQiBar();
      }

      // ===== SWORD FLIGHT =====
      function toggleFlight() {
        cult.flying = !cult.flying;
        _flyIndEl.style.display = cult.flying ? "block" : "none";
        if (_slotCache["fly"])
          _slotCache["fly"].slot.classList.toggle("active", cult.flying);
        showCultMsg(cult.flying ? "御剑飞行！" : "落地");
        playFlightToggle(cult.flying);
        if (cult.flying && cult.meditating) toggleMeditation();
      }
      function updateFlight(dt) {
        if (!cult.flying || !controls) return true;
        const keys = window._flatKeys;
        if (!keys) return true;
        // 道·飞: Flight speed scales with scene — 御剑自在
        const spd = cult.flySpd * dt * (state.currentSplat?.scale?.x || 1);
        camera.getWorldDirection(_xFwdVec);
        const fwd = _xFwdVec;
        _xRightVec.crossVectors(fwd, _xUpVec).normalize();
        const right = _xRightVec;
        if (keys["w"]) {
          camera.position.addScaledVector(fwd, spd);
          controls.target.addScaledVector(fwd, spd);
        }
        if (keys["s"]) {
          camera.position.addScaledVector(fwd, -spd * 0.6);
          controls.target.addScaledVector(fwd, -spd * 0.6);
        }
        if (keys["a"]) {
          camera.position.addScaledVector(right, -spd * 0.7);
          controls.target.addScaledVector(right, -spd * 0.7);
        }
        if (keys["d"]) {
          camera.position.addScaledVector(right, spd * 0.7);
          controls.target.addScaledVector(right, spd * 0.7);
        }
        if (keys[" "]) {
          camera.position.y += spd * 1.2;
          controls.target.y += spd * 1.2;
        }
        if (keys["shift"]) {
          camera.position.y -= spd * 1.2;
          controls.target.y -= spd * 1.2;
        }
        cult.qi = Math.max(0, cult.qi - 2 * dt);
        if (cult.qi <= 0) toggleFlight();
        state.playerPos.copy(camera.position);
        return true;
      }

      // ===== MEDITATION =====
      function toggleMeditation() {
        cult.meditating = !cult.meditating;
        if (_slotCache["meditate"])
          _slotCache["meditate"].slot.classList.toggle(
            "active",
            cult.meditating,
          );
        if (cult.meditating) {
          showCultMsg("打坐修炼中... 灵气恢复加速");
          playMeditationToggle(true);

          N = pos.length / 3,

        for (let i = 0; i < N; i++) {
          const t = i / N,
            angle = t * Math.PI * 2 * 3 + time * 2;
          const r = 1.0 + Math.sin(time * 3 + t * 10) * 0.4 + t * 1.5;
          const h = (t - 0.5) * 3 + Math.sin(time * 2 + t * 5) * 0.3;
          pos[i * 3] = cam.x + Math.cos(angle) * r;
          pos[i * 3 + 1] = cam.y + h;
          pos[i * 3 + 2] = cam.z + Math.sin(angle) * r;

        p.geometry.attributes.position.needsUpdate = true;
        p.material.color.setHSL(0.55 + Math.sin(time) * 0.05, 0.8, 0.6);

          if (controls) controls.autoRotate = false;
        });

        document.addEventListener("keydown", (e) => {
          keys[e.key.toLowerCase()] = true;
        });
        document.addEventListener("keyup", (e) => {
          keys[e.key.toLowerCase()] = false;
        });

        window._flatKeys = keys;

        const hint = document.getElementById("controls-hint");
        hint.style.display = "block";
        hint.style.opacity = "0.85";
        setTimeout(() => {
          hint.style.opacity = "0";
          setTimeout(() => (hint.style.display = "none"), 2000);
        }, 4000);

          else if (k === "3") castSpell("lightning");

          else if (k >= "5" && k <= "9") {
            const idx = parseInt(k) - 5;
            if (state.scenes[idx])
              loadWorld(state.scenes[idx].id, state.quality);
          } else if (k === "0" && state.scenes[5])
            loadWorld(state.scenes[5].id, state.quality);
          else if (k === "-" && state.scenes[6])
            loadWorld(state.scenes[6].id, state.quality);
          else if (k === "=" && state.scenes[7])
            loadWorld(state.scenes[7].id, state.quality);
          else if (k === "[" && state.scenes[8])
            loadWorld(state.scenes[8].id, state.quality);
          else if (k === "]" && state.scenes[9])
            loadWorld(state.scenes[9].id, state.quality);
          else if (k === ";" && state.scenes[10])
            loadWorld(state.scenes[10].id, state.quality);
          else if (k === "'" && state.scenes[11])
            loadWorld(state.scenes[11].id, state.quality);
          // Cultivation actions
          else if (k === "f") toggleFlight();
          else if (k === "m") toggleMeditation();
          // Formation/quality
          else if (k === "q") cycleMode();
          else if (k === "e") {
            state.quality =
              state.quality === "low"
                ? "medium"
                : state.quality === "medium"
                  ? "high"
                  : "low";
            updateQualityHUD();
            loadWorld(state.currentWorldId, state.quality);
          }
        });
      }

      function updateFlatMovement(delta) {
        const keys = window._flatKeys;
        if (!keys || !controls) return;
        if (
          keys["w"] ||
          keys["s"] ||
          keys["a"] ||
          keys["d"] ||
          keys[" "] ||
          keys["shift"]
        ) {
          controls.autoRotate = false;
        }
        // 道·行: Movement speed proportional to scene scale — natural perceived pace
        const sceneScale = state.currentSplat?.scale?.x || 1;
        const speed = 5 * delta * sceneScale;
        camera.getWorldDirection(_xFwdVec);
        _xFwdVec.y = 0;
        _xFwdVec.normalize();
        const forward = _xFwdVec;
        _xRightVec.crossVectors(forward, _xUpVec);
        const right = _xRightVec;

        if (keys["w"]) {
          camera.position.addScaledVector(forward, speed);
          controls.target.addScaledVector(forward, speed);
        }
        if (keys["s"]) {
          camera.position.addScaledVector(forward, -speed);
          controls.target.addScaledVector(forward, -speed);
        }
        if (keys["a"]) {
          camera.position.addScaledVector(right, -speed);
          controls.target.addScaledVector(right, -speed);
        }
        if (keys["d"]) {
          camera.position.addScaledVector(right, speed);
          controls.target.addScaledVector(right, speed);
        }
        if (keys[" "]) {
          camera.position.y += speed;
          controls.target.y += speed;
        }
        if (keys["shift"]) {
          camera.position.y -= speed;
          controls.target.y -= speed;
        }

        state.playerPos.copy(camera.position);
      }

      // ===== UI HELPERS =====
      function updateQualityHUD() {
        const el = document.getElementById("hud-quality");
        if (el)
          el.textContent =
            state.quality === "low"
              ? "●○○"
              : state.quality === "medium"
                ? "●●○"
                : "●●●";
      }
      function showLoading(show, text) {
        const el = document.getElementById("loading-text");
        el.style.display = show ? "block" : "none";
        if (text) el.textContent = text;
      }
      function setLoadProgress(pct) {
        document.getElementById("loading-bar").style.width = pct + "%";
        if (pct >= 100)
          setTimeout(
            () => (document.getElementById("loading-bar").style.width = "0"),
            1000,
          );
      }

      function updateSceneSwitcher() {
        const sw = document.getElementById("scene-switcher");
        sw.innerHTML = "";
        state.scenes.forEach((s, i) => {
          const dot = document.createElement("div");
          dot.className =
            "scene-dot" + (s.id === state.currentWorldId ? " active" : "");
          dot.title = SCENE_CN[s.id] || s.name;
          if (s.thumbnail) {
            const img = document.createElement("img");
            img.src = s.thumbnail;
            img.alt = s.name;
            dot.appendChild(img);
          }
          dot.onclick = () => loadWorld(s.id, state.quality);
          sw.appendChild(dot);
        });
      }

      // ===== INIT =====
      async function init() {
        showLoading(true, "初始化修仙界...");

        // Load SparkJS
        const sparkOk = await loadSparkJS();
        if (!sparkOk)
          console.warn("⚠️ SparkJS unavailable — will use fallback rendering");

        // Use embedded scenes (standalone) or fetch from Hub API (localhost dev)
        if (EMBEDDED_SCENES.length > 0) {
          state.scenes = EMBEDDED_SCENES;
          console.log(`📦 ${EMBEDDED_SCENES.length} embedded scenes loaded`);
        } else {
          try {
            const resp = await fetch("/api/curated?limit=15");
            const data = await resp.json();
            state.scenes = data.scenes?.filter((s) => !s.error) || [];
          } catch (e) {
            console.warn("Failed to fetch curated scenes:", e);
            state.scenes = [
              {
                id: CFG.defaultWorldId,
                name: "Celestial Garden",
                thumbnail: null,
                spz: {},
              },
            ];
          }
        }

        // Build gallery
        const gallery = document.getElementById("scene-gallery");
        state.scenes.forEach((s, i) => {
          const card = document.createElement("div");
          card.className = "scene-card" + (i === 0 ? " active" : "");
          card.innerHTML = `${s.thumbnail ? `<img src="${s.thumbnail}" alt="${s.name}" loading="lazy">` : '<div style="background:#1a1a2e;height:100%;display:flex;align-items:center;justify-content:center">🌍</div>'}
            <div class="label">${SCENE_CN[s.id] || s.name || "Unknown"}</div>`;
          card.onclick = () => {
            document
              .querySelectorAll(".scene-card")
              .forEach((c) => c.classList.remove("active"));
            card.classList.add("active");
            state.currentWorldId = s.id;
          };
          gallery.appendChild(card);
        });

        if (state.scenes.length > 0) {
          state.currentWorldId = state.scenes[0].id;
        }

        // Setup XR
        setupXRInputs();

        // SparkJS VR Button — optimized for 3DGS VR rendering
        const vrButtonEl = VRButton.createButton(renderer, {
          optionalFeatures: [
            "local-floor",
            "bounded-floor",
            "hand-tracking",
            "layers",
          ],
        });
        if (vrButtonEl) {
          vrButtonEl.style.display = "none";
          document.body.appendChild(vrButtonEl);
        }

        const vrBtn = document.getElementById("enterVR");
        const flatBtn = document.getElementById("enterFlat");

        // Check VR support
        checkVRSupport(vrBtn, vrButtonEl);

        flatBtn.onclick = () => {
          document.getElementById("overlay").classList.add("hidden");
          document.getElementById("hud").style.display = "flex";
          document.getElementById("scene-switcher").style.display = "flex";
          enableFlatMode();
          if (!cult.atmosParticles) createAtmosphericParticles();
          document.getElementById("cultivation-hud").style.display = "flex";
          loadWorld(state.currentWorldId, state.quality);
        };

        showLoading(false);

        // XR session events
        renderer.xr.addEventListener("sessionstart", () => {
          state.isVR = true;
          initAudio();
          document.getElementById("overlay").classList.add("hidden");
          document.getElementById("hud").style.display = "none";
          document.getElementById("cultivation-hud").style.display = "flex";
          scene.fog.near = 40;
          scene.fog.far = 150;
          if (!cult.atmosParticles) createAtmosphericParticles();
          if (!state.currentWorldId)
            loadWorld(CFG.defaultWorldId, state.quality);
          console.log("🥽 VR session started");
        });
        renderer.xr.addEventListener("sessionend", () => {
          state.isVR = false;
          document.getElementById("hud").style.display = "flex";
          scene.fog.near = 15;
          scene.fog.far = 80;
        });
      }

      async function checkVRSupport(btn, vrButtonEl) {
        for (let i = 0; i < 6; i++) {
          try {
            if (navigator.xr) {
              const ok = await navigator.xr.isSessionSupported("immersive-vr");
              if (ok) {
                btn.textContent = "进入VR修仙";
                btn.disabled = false;
                btn.onclick = () => {
                  initAudio();
                  vrButtonEl.click();
                  document.getElementById("overlay").classList.add("hidden");
                  document.getElementById("scene-switcher").style.display =
                    "flex";
                  document.getElementById("cultivation-hud").style.display =
                    "flex";
                  if (!cult.atmosParticles) createAtmosphericParticles();
                  loadWorld(state.currentWorldId, state.quality);
                };
                return;
              }
            }
          } catch (e) {}
          await new Promise((r) => setTimeout(r, 400 * Math.pow(1.5, i)));
        }
        btn.textContent = navigator.xr ? "VR不可用" : "WebXR不支持";
      }

      // ===== RENDER LOOP =====
      const clock = new THREE.Clock();
      let lastTime = 0,
        fpsCount = 0,
        fpsLast = performance.now(),
        _stableFpsHigh = 0,
        _lastQualitySwitch = 0;

      renderer.setAnimationLoop((timestamp, frame) => {
        const time = clock.getElapsedTime();
        const delta = time - lastTime;
        lastTime = time;

        // localFrame compensation — VR only (道·静: 致虚极 守静笃)
        // SparkJS hack for Quest 3/Vision Pro teleport discontinuities.
        // In flat mode, OrbitControls moves camera smoothly; triggering this
        // every 0.5 units forces full gaussian re-sort (500k) per frame → 1 FPS.
        // 反者道之动: the "fix" was the disease. Disable in flat mode.
        if (state.isVR && lastCameraPos.distanceTo(camera.position) > 0.5) {
          localFrame.position.copy(camera.position).multiplyScalar(-1);
          lastCameraPos.copy(camera.position);
        }

        // XR input
        if (state.isVR && frame) {
          // SparkJS XR Hands update
          if (xrHands) {
            xrHands.update({ xr: renderer.xr, xrFrame: frame });
          }
          // B4: VR flight speed multiplier (set before update)
          if (fpsMovement) {
            fpsMovement.moveSpeed = cult.flying ? 12.0 : 3.0;
            fpsMovement.update(delta, localFrame);
          }
          // B2: VR flight qi consumption
          if (cult.flying) {
            cult.qi = Math.max(0, cult.qi - 2 * delta);
            if (cult.qi <= 0) toggleFlight();
          }
          // Controller target tracking + B1: VR button handling
          const session = renderer.xr.getSession();
          if (session) {
            for (const src of session.inputSources) {
              if (src.gamepad && src.gripSpace) {
                const gp = src.gamepad;
                const ctrl =
                  src.handedness === "left" ? controller1 : controller2;
                if (ctrl) {
                  ctrl.getWorldPosition(_xCtrlPos);
                  if (_xCtrlPos.length() > 0.1) {
                    state.targetPosition.lerp(_xCtrlPos, 0.08);
                    state.isTracking = true;
                  }
                }
                // B1: A/B/X/Y buttons for spells/flight/meditation
                if (gp.buttons.length > 4) {
                  if (src.handedness === "right") {
                    if (gp.buttons[4]?.pressed && !_gpBtnPrev.rA) {
                      castSpell(spellOrder[cult.currentSpellIdx]);
                      triggerHaptic(controller2);
                    }
                    _gpBtnPrev.rA = !!gp.buttons[4]?.pressed;
                    if (gp.buttons[5]?.pressed && !_gpBtnPrev.rB) {
                      cult.currentSpellIdx =
                        (cult.currentSpellIdx + 1) % spellOrder.length;
                      showCultMsg(
                        SPELLS[spellOrder[cult.currentSpellIdx]].name,
                      );
                    }
                    _gpBtnPrev.rB = !!gp.buttons[5]?.pressed;
                  } else {
                    if (gp.buttons[4]?.pressed && !_gpBtnPrev.lX) {
                      toggleFlight();
                      triggerHaptic(controller1);
                    }
                    _gpBtnPrev.lX = !!gp.buttons[4]?.pressed;
                    if (gp.buttons[5]?.pressed && !_gpBtnPrev.lY) {
                      toggleMeditation();
                      triggerHaptic(controller1);
                    }
                    _gpBtnPrev.lY = !!gp.buttons[5]?.pressed;
                  }
                }
                break;
              }
            }
          }
          updateVRHUD();
        } else {
          if (cult.flying) updateFlight(delta);
          else updateFlatMovement(delta);
        }

        updateSwords(time, delta);
        updateAtmosParticles(time, delta);
        updateSpells(delta);
        updateMeditation(time, delta);
        if (controls) controls.update();

        // FPS counter
        fpsCount++;
        if (performance.now() - fpsLast >= 1000) {
          const fps = fpsCount;
          fpsCount = 0;
          fpsLast = performance.now();
          if (fps < 30 && adaptiveSwordCount > 15)
            adaptiveSwordCount = Math.max(15, adaptiveSwordCount - 5);
          else if (fps > 50 && adaptiveSwordCount < CFG.swordCount)
            adaptiveSwordCount = Math.min(
              CFG.swordCount,
              adaptiveSwordCount + 3,
            );
          if (_hudFpsEl)
            _hudFpsEl.textContent = `${adaptiveSwordCount}剑 ${fps}FPS`;
          // 道·适应: dynamic quality — 唯变所适 适应一切
          const _qCooldownOk = performance.now() - _lastQualitySwitch > 15000;
          if (
            fps < 8 &&
            state.quality !== "low" &&
            !_loadingWorld &&
            _qCooldownOk
          ) {
            console.warn("⚠️ 道·退: FPS=" + fps + ", 自动降级画质");
            state.quality = "low";
            _lastQualitySwitch = performance.now();
            _stableFpsHigh = 0;
            updateQualityHUD();
            loadWorld(state.currentWorldId, "low");
          } else if (
            fps > 55 &&
            state.quality === "low" &&
            !_loadingWorld &&
            _qCooldownOk
          ) {
            _stableFpsHigh++;
            if (_stableFpsHigh >= 4) {
              console.log("🔺 道·进: FPS=" + fps + " stable, 升级至medium");
              state.quality = "medium";
              _lastQualitySwitch = performance.now();
              _stableFpsHigh = 0;
              updateQualityHUD();
              loadWorld(state.currentWorldId, "medium");
            }
          } else if (fps <= 55) {
            _stableFpsHigh = 0;
          }
        }

        renderer.render(scene, camera);
      });

      window.addEventListener("resize", () => {
        const w = window.innerWidth,
          h = window.innerHeight;
        if (w > 0 && h > 0) {
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
          renderer.setSize(w, h);
        }
      });

      // Boot
      init();
    </script>
  </body>
</html>
